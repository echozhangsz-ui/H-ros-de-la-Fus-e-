<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Block Character Cards | Rocket Boss Game</title>
<style>
:root {
  --ink: #161411;
  --paper: #fffaf0;
  --line: #222018;
  --muted: #625e53;
  --sand: #eadab7;
  --ground: #8c7045;
}

* { box-sizing: border-box; }

html,
body {
  margin: 0;
  min-height: 100%;
  color: var(--ink);
  font-family: Arial, "Microsoft YaHei", sans-serif;
  background:
    radial-gradient(circle at 14% 8%, rgba(47, 143, 114, .14), transparent 25%),
    radial-gradient(circle at 90% 7%, rgba(228, 77, 38, .15), transparent 27%),
    linear-gradient(180deg, #f4ecd8 0%, #d5bf8d 100%);
}

body { overflow-x: hidden; }

.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px;
}

header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: end;
  padding-bottom: 18px;
  border-bottom: 3px solid var(--line);
}

h1 {
  margin: 0;
  font-size: clamp(32px, 5vw, 56px);
  line-height: 1;
}

.subtitle {
  margin: 10px 0 0;
  max-width: 780px;
  color: var(--muted);
  font-size: 16px;
}

.badge {
  border: 2px solid var(--line);
  border-radius: 8px;
  background: #fff;
  padding: 9px 12px;
  font-weight: 900;
  white-space: nowrap;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
  margin-top: 22px;
}

.card {
  overflow: hidden;
  background: rgba(255, 250, 240, .94);
  border: 3px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 14px 34px rgba(38, 30, 13, .18);
}

.viewer {
  position: relative;
  height: 370px;
  border-bottom: 3px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255,255,255,.6) 0%, rgba(245,238,219,.18) 54%, transparent 55%),
    linear-gradient(180deg, #d7c69f 0%, #c7b27d 62%, var(--ground) 62%, #715834 100%);
  cursor: grab;
  touch-action: none;
  user-select: none;
}

.viewer.dragging { cursor: grabbing; }

.viewer canvas {
  position: absolute;
  inset: 0;
  display: block;
  width: 100%;
  height: 100%;
}

.drag-hint {
  position: absolute;
  left: 10px;
  bottom: 10px;
  z-index: 2;
  border: 2px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,.9);
  padding: 4px 9px;
  font-size: 12px;
  font-weight: 900;
}

.meta {
  padding: 14px;
}

.meta h2 {
  margin: 0 0 7px;
  font-size: 24px;
}

.role {
  margin: 0 0 10px;
  color: var(--muted);
  font-size: 13px;
}

.desc {
  min-height: 48px;
  margin: 0;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}

.stat {
  min-width: 0;
  border: 2px solid var(--line);
  border-radius: 6px;
  background: #fff;
  padding: 8px;
  font-size: 12px;
}

.stat strong {
  display: block;
  font-size: 20px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 12px;
}

.pill {
  border: 2px solid var(--line);
  border-radius: 999px;
  background: #fff;
  padding: 4px 8px;
  font-size: 12px;
  font-weight: 900;
}

.fallback {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: var(--muted);
  font-weight: 900;
}

.webgl-ready .fallback { display: none; }

@media (max-width: 980px) {
  header { grid-template-columns: 1fr; }
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

@media (max-width: 640px) {
  .page { padding: 14px; }
  .grid { grid-template-columns: 1fr; }
  .viewer { height: 340px; }
}
</style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <h1>3D Block Character Cards</h1>
      <p class="subtitle">按原设计图重新做成方块角色：方块头、方块身体、细长手脚，并保留每个角色的武器、脸部和 Boss 造型特征。拖动每个角色框可以旋转查看。</p>
    </div>
    <div class="badge">6 block models · drag to rotate</div>
  </header>
  <main class="grid" id="grid"></main>
</div>

<script type="module">
import * as THREE from "./three.module.js";

const characters = [
  {
    id: "marc",
    name: "Marc",
    role: "Player · Explorer · Rocket builder",
    desc: "主角，绿色方块头、白色上衣和细长四肢，接近原设计图里的普通玩家形象。",
    pv: "12",
    atk: "3+",
    speed: "Medium",
    tags: ["Player", "Tool", "Rocket"],
    scale: 1,
    skin: 0x69a78b,
    shirt: 0xf4f0e5,
    pants: 0xcfd5de,
    hair: 0x202020,
    hand: 0x4a8b70,
    eyes: 0x101010,
    mouth: "flat",
    weapon: "pickaxe"
  },
  {
    id: "davide",
    name: "Davide",
    role: "Enemy · Fast · Sword",
    desc: "快速近战敌人，绿色脸、黑色斜发和手持剑，保留原画里奔跑攻击的感觉。",
    pv: "8",
    atk: "6+",
    speed: "Fast",
    tags: ["Enemy", "Sword", "Chase"],
    scale: 1.03,
    skin: 0x78a889,
    shirt: 0xf0eee8,
    pants: 0xded8ce,
    hair: 0x191919,
    hand: 0x4a8b70,
    eyes: 0x1c2b6d,
    mouth: "smile",
    weapon: "sword",
    forwardLean: true
  },
  {
    id: "julie",
    name: "Julie Robot",
    role: "Robot · Guard · Smooth",
    desc: "机器人角色，方形头和方块肩膀更宽，眼睛和关节带一点蓝色机械发光。",
    pv: "15",
    atk: "4+",
    speed: "Steady",
    tags: ["Robot", "Guard", "Resource"],
    scale: 1,
    skin: 0xc7cdd3,
    shirt: 0xb8c0c9,
    pants: 0xbfc5cc,
    hair: 0x7edbff,
    hand: 0x9da7b3,
    eyes: 0x213040,
    mouth: "smile",
    robot: true
  },
  {
    id: "olivier",
    name: "Olivier",
    role: "Enemy · Ambush · High damage",
    desc: "伏击敌人，绿色怪物脸、黑发和锯齿嘴，外形更接近原设计图中的可怕表情。",
    pv: "7",
    atk: "7+",
    speed: "Quick",
    tags: ["Enemy", "Ambush", "Damage"],
    scale: 1.04,
    skin: 0x82b48b,
    shirt: 0xf1eee5,
    pants: 0xe3ddd3,
    hair: 0x171717,
    hand: 0x4f9474,
    eyes: 0x101010,
    mouth: "teeth",
    weapon: "club",
    forwardLean: true
  },
  {
    id: "zombie",
    name: "Zombie",
    role: "Enemy · Common · Map patrol",
    desc: "普通世界敌人，灰绿皮肤、暗绿衣服和拖沓步态，用方块体型表现低速巡逻。",
    pv: "7",
    atk: "5",
    speed: "Slow",
    tags: ["Enemy", "Patrol", "Slow"],
    scale: .98,
    skin: 0x8fb07a,
    shirt: 0x556b46,
    pants: 0x3f4b39,
    hair: 0x713b3b,
    hand: 0x82a96f,
    eyes: 0x111111,
    mouth: "flat",
    zombie: true
  },
  {
    id: "boss",
    name: "Boss",
    role: "Final Boss · Volcano · Multi-arm",
    desc: "最终 Boss，按原画做成巨大方块身体、四条折臂、尖牙脸和两把长武器。",
    pv: "70",
    atk: "40",
    speed: "Heavy",
    tags: ["Boss", "Volcano", "Lava"],
    scale: 1.23,
    skin: 0xaec1b4,
    shirt: 0xf1eee5,
    pants: 0x222222,
    hair: 0x151515,
    hand: 0xaec1b4,
    eyes: 0x101010,
    mouth: "teeth",
    boss: true
  }
];

const grid = document.getElementById("grid");
const liveCards = [];

function makeCard(config) {
  const card = document.createElement("article");
  card.className = "card";
  card.innerHTML = `
    <div class="viewer" data-id="${config.id}">
      <canvas aria-label="${config.name} block 3D model"></canvas>
      <div class="fallback">3D model loading</div>
      <div class="drag-hint">Drag to rotate</div>
    </div>
    <div class="meta">
      <h2>${config.name}</h2>
      <p class="role">${config.role}</p>
      <p class="desc">${config.desc}</p>
      <div class="stats">
        <div class="stat"><strong>${config.pv}</strong>PV</div>
        <div class="stat"><strong>${config.atk}</strong>Attack</div>
        <div class="stat"><strong>${config.speed}</strong>Speed</div>
      </div>
      <div class="tags">${config.tags.map(tag => `<span class="pill">${tag}</span>`).join("")}</div>
    </div>
  `;
  grid.appendChild(card);
  return card;
}

function mat(color, roughness = .78, metalness = .02) {
  return new THREE.MeshStandardMaterial({ color, roughness, metalness });
}

function block(parent, size, color, position, options = {}) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(size[0], size[1], size[2]), mat(color, options.roughness, options.metalness));
  mesh.position.set(position[0], position[1], position[2]);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  if (options.rotation) mesh.rotation.set(options.rotation[0], options.rotation[1], options.rotation[2]);
  parent.add(mesh);
  return mesh;
}

function pixel(parent, size, color, position) {
  const mesh = block(parent, size, color, position, { roughness: .62 });
  mesh.castShadow = false;
  return mesh;
}

function addFace(root, config, headY, headDepth) {
  const z = headDepth / 2 + .012;
  const eyeY = headY + (config.boss ? .05 : .03);
  pixel(root, [.13, .13, .035], config.eyes, [-.16, eyeY, z]);
  pixel(root, [.13, .13, .035], config.eyes, [.16, eyeY, z]);

  if (config.mouth === "teeth") {
    pixel(root, [.48, .08, .038], 0x111111, [0, headY - .18, z]);
    for (let i = 0; i < 4; i++) {
      pixel(root, [.07, .09, .04], 0xffffff, [-.18 + i * .12, headY - .13, z + .004]);
    }
  } else if (config.mouth === "smile") {
    pixel(root, [.34, .055, .038], 0x111111, [0, headY - .19, z]);
    pixel(root, [.065, .07, .038], 0x111111, [-.2, headY - .15, z]);
    pixel(root, [.065, .07, .038], 0x111111, [.2, headY - .15, z]);
  } else {
    pixel(root, [.3, .055, .038], 0x111111, [0, headY - .18, z]);
  }
}

function addHair(root, config, headY, headSize) {
  const topY = headY + headSize[1] / 2 + .04;
  block(root, [headSize[0] + .06, .12, headSize[2] + .05], config.hair, [0, topY, 0]);

  if (config.id === "davide") {
    block(root, [.56, .22, .12], config.hair, [-.14, topY - .04, .18], { rotation: [0, 0, -.38] });
  }

  if (config.id === "olivier" || config.boss) {
    for (let i = 0; i < 5; i++) {
      const spike = block(root, [.08, .28 + i * .025, .1], config.hair, [-.28 + i * .14, topY + .15, .02]);
      spike.rotation.z = -.18 + i * .09;
    }
  }
}

function makeLimb(root, config, side, type, y, length, thickness) {
  const pivot = new THREE.Group();
  const x = side === "left" ? -.55 : .55;
  pivot.position.set(x, y, 0);
  root.add(pivot);
  const color = type === "arm" ? config.hand : config.pants;
  const limb = block(pivot, [thickness, length, thickness], color, [0, -length / 2, 0]);
  limb.name = `${side}-${type}`;
  return pivot;
}

function addWeapon(handPivot, type, side = "right") {
  if (!type) return;
  const group = new THREE.Group();
  group.position.set(0, -.72, .02);
  handPivot.add(group);
  const direction = side === "left" ? -1 : 1;

  if (type === "sword") {
    block(group, [.07, 1.1, .07], 0xdfe7ef, [direction * .22, -.18, .12], { roughness: .35, metalness: .42, rotation: [0, 0, direction * -.48] });
    block(group, [.38, .07, .09], 0x1c1c1c, [direction * .04, .21, .12], { rotation: [0, 0, direction * -.48] });
  } else if (type === "pickaxe") {
    block(group, [.07, .86, .07], 0x7a5434, [direction * .15, -.08, .1], { rotation: [0, 0, direction * -.28] });
    block(group, [.62, .08, .08], 0xb9c0c8, [direction * .06, .34, .1], { roughness: .42, metalness: .28, rotation: [0, 0, direction * -.28] });
  } else if (type === "club") {
    block(group, [.13, .84, .13], 0x6a442e, [direction * .16, -.1, .1], { rotation: [0, 0, direction * -.35] });
    block(group, [.28, .26, .2], 0x8a5633, [direction * .33, .22, .1], { rotation: [0, 0, direction * -.35] });
  } else if (type === "bossBlade") {
    block(group, [.1, 1.48, .09], 0x111111, [direction * .32, -.34, .08], { rotation: [0, 0, direction * -.5] });
    block(group, [.32, .16, .11], 0xd8d8d8, [direction * .62, -.95, .08], { roughness: .36, metalness: .35, rotation: [0, 0, direction * -.5] });
  }
}

function buildBlockCharacter(config) {
  const root = new THREE.Group();
  root.scale.setScalar(config.scale);
  root.rotation.z = config.forwardLean ? -.04 : 0;

  const bodySize = config.boss ? [1.28, 1.08, .52] : config.robot ? [1.18, .92, .5] : [.88, .95, .48];
  const headSize = config.boss ? [.72, .72, .58] : config.robot ? [.78, .66, .58] : [.68, .72, .58];
  const bodyY = config.boss ? 1.35 : 1.27;
  const headY = config.boss ? 2.33 : 2.12;

  const body = block(root, bodySize, config.shirt, [0, bodyY, 0]);
  const neck = block(root, [.2, .28, .22], config.skin, [0, headY - .52, 0]);
  const head = block(root, headSize, config.skin, [0, headY, 0]);
  addHair(root, config, headY, headSize);
  addFace(root, config, headY, headSize[2]);

  if (config.robot) {
    pixel(root, [.08, .24, .04], 0x7edbff, [-.5, 1.3, .27]);
    pixel(root, [.08, .24, .04], 0x7edbff, [.5, 1.3, .27]);
    pixel(root, [.12, .12, .04], 0x7edbff, [0, 1.35, .28]);
  }

  if (config.boss) {
    pixel(root, [.84, .12, .04], 0x111111, [0, 1.62, .28]);
    pixel(root, [.65, .06, .04], 0x111111, [0, 1.4, .28]);
  }

  const armLength = config.boss ? 1.02 : .92;
  const legLength = config.boss ? .86 : .82;
  const limbThickness = config.boss ? .16 : .13;
  const leftArm = makeLimb(root, config, "left", "arm", config.boss ? 1.72 : 1.65, armLength, limbThickness);
  const rightArm = makeLimb(root, config, "right", "arm", config.boss ? 1.72 : 1.65, armLength, limbThickness);
  const leftLeg = makeLimb(root, config, "left", "leg", .84, legLength, config.boss ? .17 : .14);
  const rightLeg = makeLimb(root, config, "right", "leg", .84, legLength, config.boss ? .17 : .14);
  leftLeg.position.x = config.boss ? -.28 : -.22;
  rightLeg.position.x = config.boss ? .28 : .22;

  if (config.zombie) {
    leftArm.rotation.x = -.75;
    rightArm.rotation.x = -.75;
  }

  addWeapon(rightArm, config.weapon, "right");

  let extraLeft = null;
  let extraRight = null;
  if (config.boss) {
    extraLeft = makeLimb(root, config, "left", "arm", 1.36, 1.08, .15);
    extraRight = makeLimb(root, config, "right", "arm", 1.36, 1.08, .15);
    extraLeft.position.x = -.76;
    extraRight.position.x = .76;
    addWeapon(leftArm, "bossBlade", "left");
    addWeapon(rightArm, "bossBlade", "right");
    addWeapon(extraLeft, "bossBlade", "left");
    addWeapon(extraRight, "bossBlade", "right");
  }

  return { root, parts: { body, neck, head, leftArm, rightArm, leftLeg, rightLeg, extraLeft, extraRight }, config };
}

function createScene(canvas, config) {
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, 1, .1, 40);
  camera.position.set(0, 2.45, config.boss ? 7.2 : 6.4);
  camera.lookAt(0, 1.3, 0);

  scene.add(new THREE.HemisphereLight(0xffffff, 0x6d5430, 1.9));
  const key = new THREE.DirectionalLight(0xffffff, 2.4);
  key.position.set(4, 6, 4);
  key.castShadow = true;
  key.shadow.mapSize.set(1024, 1024);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xf5dfb4, .8);
  fill.position.set(-3, 3, 2);
  scene.add(fill);

  const ground = block(scene, [5.1, .22, 4.2], 0x80643c, [0, -.13, 0], { roughness: .9 });
  ground.receiveShadow = true;
  ground.castShadow = false;

  const model = buildBlockCharacter(config);
  model.root.position.y = .04;
  model.root.rotation.y = config.boss ? -.24 : .18;
  scene.add(model.root);

  return {
    renderer,
    scene,
    camera,
    model,
    rotation: config.boss ? -.24 : .18,
    targetRotation: config.boss ? -.24 : .18,
    dragging: false,
    lastX: 0
  };
}

function resizeRenderer(entry, viewer) {
  const rect = viewer.getBoundingClientRect();
  const width = Math.max(1, Math.floor(rect.width));
  const height = Math.max(1, Math.floor(rect.height));
  const canvas = entry.renderer.domElement;
  if (canvas.width !== width || canvas.height !== height) {
    entry.renderer.setSize(width, height, false);
    entry.camera.aspect = width / height;
    entry.camera.updateProjectionMatrix();
  }
}

function animateModel(model, elapsed) {
  const { config, parts, root } = model;
  const speed = config.boss ? 2.6 : config.zombie ? 3.1 : config.id === "davide" ? 4.8 : 4.1;
  const swing = Math.sin(elapsed * speed);
  const counter = Math.cos(elapsed * speed);
  const weight = config.boss ? .5 : config.zombie ? .55 : 1;

  root.position.y = .04 + Math.abs(swing) * .06 * weight;
  parts.body.rotation.z = swing * .025 * weight;
  parts.head.rotation.z = -swing * .035 * weight;

  if (config.zombie) {
    parts.leftArm.rotation.x = -.78 + swing * .1;
    parts.rightArm.rotation.x = -.78 - swing * .1;
  } else {
    parts.leftArm.rotation.x = swing * .66 * weight;
    parts.rightArm.rotation.x = -swing * .66 * weight;
  }

  parts.leftLeg.rotation.x = -swing * .58 * weight;
  parts.rightLeg.rotation.x = swing * .58 * weight;

  if (parts.extraLeft) parts.extraLeft.rotation.x = counter * .46;
  if (parts.extraRight) parts.extraRight.rotation.x = -counter * .46;
}

function attachDrag(viewer, entry) {
  viewer.addEventListener("pointerdown", event => {
    viewer.classList.add("dragging");
    entry.dragging = true;
    entry.lastX = event.clientX;
    viewer.setPointerCapture?.(event.pointerId);
  });

  viewer.addEventListener("pointermove", event => {
    if (!entry.dragging) return;
    const delta = event.clientX - entry.lastX;
    entry.lastX = event.clientX;
    entry.targetRotation += delta * .012;
  });

  const end = () => {
    viewer.classList.remove("dragging");
    entry.dragging = false;
  };
  viewer.addEventListener("pointerup", end);
  viewer.addEventListener("pointercancel", end);
}

characters.forEach(config => {
  const card = makeCard(config);
  const viewer = card.querySelector(".viewer");
  const canvas = card.querySelector("canvas");
  try {
    const entry = createScene(canvas, config);
    viewer.classList.add("webgl-ready");
    attachDrag(viewer, entry);
    liveCards.push({ viewer, entry });
  } catch (error) {
    console.error(error);
  }
});

const clock = new THREE.Clock();

function render() {
  const elapsed = clock.getElapsedTime();
  for (const { viewer, entry } of liveCards) {
    resizeRenderer(entry, viewer);
    entry.rotation += (entry.targetRotation - entry.rotation) * .18;
    if (!entry.dragging) entry.targetRotation += .0023;
    entry.model.root.rotation.y = entry.rotation;
    animateModel(entry.model, elapsed);
    entry.renderer.render(entry.scene, entry.camera);
  }
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
