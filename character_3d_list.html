<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Block Character Cards | Rocket Boss Game</title>
<style>
:root {
  --ink: #161411;
  --line: #222018;
  --muted: #625e53;
  --ground: #8c7045;
}

* { box-sizing: border-box; }

html,
body {
  margin: 0;
  min-height: 100%;
  color: var(--ink);
  font-family: Arial, "Microsoft YaHei", sans-serif;
  background:
    radial-gradient(circle at 14% 8%, rgba(47, 143, 114, .14), transparent 25%),
    radial-gradient(circle at 90% 7%, rgba(228, 77, 38, .15), transparent 27%),
    linear-gradient(180deg, #f4ecd8 0%, #d5bf8d 100%);
}

body { overflow-x: hidden; }

.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px;
}

header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: end;
  padding-bottom: 18px;
  border-bottom: 3px solid var(--line);
}

h1 {
  margin: 0;
  font-size: clamp(32px, 5vw, 56px);
  line-height: 1;
}

.subtitle {
  margin: 10px 0 0;
  max-width: 780px;
  color: var(--muted);
  font-size: 16px;
}

.badge {
  border: 2px solid var(--line);
  border-radius: 8px;
  background: #fff;
  padding: 9px 12px;
  font-weight: 900;
  white-space: nowrap;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
  margin-top: 22px;
}

.card {
  overflow: hidden;
  background: rgba(255, 250, 240, .94);
  border: 3px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 14px 34px rgba(38, 30, 13, .18);
}

.viewer {
  position: relative;
  height: 370px;
  border-bottom: 3px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255,255,255,.6) 0%, rgba(245,238,219,.18) 54%, transparent 55%),
    linear-gradient(180deg, #d7c69f 0%, #c7b27d 62%, var(--ground) 62%, #715834 100%);
  cursor: grab;
  touch-action: none;
  user-select: none;
}

.viewer.dragging { cursor: grabbing; }

.viewer canvas {
  position: absolute;
  inset: 0;
  z-index: 1;
  display: block;
  width: 100%;
  height: 100%;
}

.drag-hint {
  position: absolute;
  left: 10px;
  bottom: 10px;
  z-index: 3;
  border: 2px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,.9);
  padding: 4px 9px;
  font-size: 12px;
  font-weight: 900;
}

.fallback-model {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: grid;
  place-items: end center;
  padding-bottom: 52px;
  perspective: 760px;
  pointer-events: none;
}

.webgl-ready .fallback-model {
  display: none;
}

.fallback-shadow {
  position: absolute;
  left: 50%;
  bottom: 58px;
  width: 148px;
  height: 28px;
  transform: translateX(-50%) skewX(-16deg);
  background: rgba(42, 31, 16, .24);
}

.block-person {
  position: relative;
  width: 170px;
  height: 240px;
  transform-origin: 50% 88%;
  transform-style: preserve-3d;
  animation: css-walk .82s ease-in-out infinite;
}

.block-person.boss-css {
  width: 230px;
  height: 278px;
  animation-duration: 1s;
}

.marc-css {
  transform-style: flat;
}

.marc-css .part {
  box-shadow: inset -10px -8px 0 rgba(0,0,0,.14), 0 7px 12px rgba(0,0,0,.14);
  transition:
    top .18s ease,
    width .18s ease,
    height .18s ease,
    margin-left .18s ease,
    background .18s ease,
    opacity .14s ease,
    transform .18s ease;
}

.marc-css .eye,
.marc-css .mouth {
  transition: opacity .12s ease;
}

.marc-css.marc-side {
  animation-name: css-side-walk;
}

.marc-css.marc-side .head {
  width: 46px;
  height: 72px;
  margin-left: -23px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.12), transparent 42%),
    var(--skin);
}

.marc-css.marc-side .hair {
  width: 54px;
  height: 13px;
  margin-left: -27px;
  background: var(--hair);
}

.marc-css.marc-side .body {
  top: 89px;
  width: 44px;
  height: 96px;
  margin-left: -22px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.22), transparent 42%),
    var(--shirt);
}

.marc-css.marc-side .arm {
  top: 92px;
  width: 34px;
  height: 108px;
  margin-left: -31px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.16), transparent 42%),
    var(--hand);
}

.marc-css.marc-side .arm.right {
  display: none;
}

.marc-css.marc-side .leg {
  top: 182px;
  width: 32px;
  height: 66px;
  margin-left: -17px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.2), transparent 42%),
    var(--pants);
}

.marc-css.marc-side .leg.right {
  display: none;
}

.marc-css.marc-side .eye,
.marc-css.marc-side .mouth {
  opacity: 0;
}

.marc-css.marc-back .eye,
.marc-css.marc-back .mouth {
  display: none;
}

.marc-css.marc-back .head {
  background:
    linear-gradient(90deg, rgba(0,0,0,.12), transparent 22%, transparent 78%, rgba(0,0,0,.12)),
    var(--skin);
}

.marc-css.marc-back .body {
  background:
    linear-gradient(90deg, rgba(0,0,0,.08), transparent 22%, transparent 78%, rgba(0,0,0,.1)),
    var(--shirt);
}

.voxel-marc {
  position: relative;
  width: 190px;
  height: 255px;
  transform-style: preserve-3d;
  transform-origin: 50% 82%;
  animation: voxel-marc-walk .82s ease-in-out infinite;
}

.voxel-marc .cube {
  position: absolute;
  left: calc(50% + var(--x, 0px));
  top: var(--y);
  width: var(--w);
  height: var(--h);
  margin-left: calc(var(--w) / -2);
  transform-style: preserve-3d;
}

.voxel-marc .face {
  position: absolute;
  box-sizing: border-box;
  border: 2px solid rgba(20, 18, 14, .78);
  background: var(--c);
  backface-visibility: hidden;
}

.voxel-marc .front,
.voxel-marc .back {
  width: var(--w);
  height: var(--h);
}

.voxel-marc .front {
  transform: translateZ(calc(var(--d) / 2));
  box-shadow: inset -10px -9px 0 rgba(0,0,0,.12);
}

.voxel-marc .back {
  transform: rotateY(180deg) translateZ(calc(var(--d) / 2));
  filter: brightness(.88);
}

.voxel-marc .right,
.voxel-marc .left {
  left: calc((var(--w) - var(--d)) / 2);
  width: var(--d);
  height: var(--h);
}

.voxel-marc .right {
  transform: rotateY(90deg) translateZ(calc(var(--w) / 2));
  filter: brightness(.8);
}

.voxel-marc .left {
  transform: rotateY(-90deg) translateZ(calc(var(--w) / 2));
  filter: brightness(.92);
}

.voxel-marc .top,
.voxel-marc .bottom {
  top: calc((var(--h) - var(--d)) / 2);
  width: var(--w);
  height: var(--d);
}

.voxel-marc .top {
  transform: rotateX(90deg) translateZ(calc(var(--h) / 2));
  filter: brightness(1.12);
}

.voxel-marc .bottom {
  transform: rotateX(-90deg) translateZ(calc(var(--h) / 2));
  filter: brightness(.72);
}

.voxel-marc .head-cube {
  --x: 0px;
  --y: 18px;
  --w: 62px;
  --h: 72px;
  --d: 58px;
  --c: var(--skin);
}

.voxel-marc .hair-cube {
  --x: 0px;
  --y: 8px;
  --w: 76px;
  --h: 14px;
  --d: 64px;
  --c: var(--hair);
}

.voxel-marc .body-cube {
  --x: 0px;
  --y: 90px;
  --w: 78px;
  --h: 92px;
  --d: 24px;
  --c: var(--shirt);
}

.voxel-marc .arm-left-cube,
.voxel-marc .arm-right-cube {
  --y: 96px;
  --w: 34px;
  --h: 102px;
  --d: 34px;
  --c: var(--hand);
}

.voxel-marc .arm-left-cube { --x: -58px; }
.voxel-marc .arm-right-cube { --x: 58px; }

.voxel-marc .leg-left-cube,
.voxel-marc .leg-right-cube {
  --y: 178px;
  --w: 32px;
  --h: 68px;
  --d: 32px;
  --c: var(--pants);
}

.voxel-marc .leg-left-cube { --x: -18px; }
.voxel-marc .leg-right-cube { --x: 18px; }

.voxel-marc .tool-cube {
  --x: 66px;
  --y: 126px;
  --w: 8px;
  --h: 92px;
  --d: 8px;
  --c: var(--weapon);

}

.voxel-marc .v-eye,
.voxel-marc .v-mouth {

}

.voxel-marc .v-eye {

}

}

  height: 6px;
}

.body {

  function marcFallbackHtml(style) {

    var rotation = 0;
    var dragging = false;
    var lastX = 0;
    var lastY = 0;
    var dragMode = "";

    function setRotation(value) {
      rotation = value;
      if (!model) return;
      model.style.setProperty("--fallback-rotation", rotation + "deg");
      if (model.classList.contains("marc-css")) {
        var normalized = ((rotation % 360) + 360) % 360;
        var side = (normalized >= 60 && normalized <= 120) || (normalized >= 240 && normalized <= 300);
        var back = normalized > 152 && normalized < 208;
        model.classList.toggle("marc-side", side);
        model.classList.toggle("marc-back", back);
      }
    }

    viewer.addEventListener("pointerdown", function (event) {
      dragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
      dragMode = "";
      viewer.classList.add("dragging");
      if (viewer.setPointerCapture) viewer.setPointerCapture(event.pointerId);
    });

    viewer.addEventListener("pointermove", function (event) {
      if (!dragging) return;
      var delta = event.clientX - lastX;
      var deltaY = event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;
      if (!dragMode) {
        if (Math.abs(delta) < 4 && Math.abs(deltaY) < 4) return;
        dragMode = Math.abs(deltaY) > Math.abs(delta) ? "scroll" : "rotate";
      }
      if (dragMode === "scroll") {
        window.scrollBy(0, -deltaY);
        return;
      }
      setRotation(rotation + delta * .75);
    });

    function endDrag() {
      dragging = false;
      dragMode = "";
      viewer.classList.remove("dragging");
    }

    viewer.addEventListener("pointerup", endDrag);
    viewer.addEventListener("pointercancel", endDrag);
    viewer.addEventListener("lostpointercapture", endDrag);
  });
}());

<script type="module">
import * as THREE from "./three.module.js";

const characters = window.characterData || [];
const liveCards = [];

function mat(color, roughness = .78, metalness = .02) {
  return new THREE.MeshStandardMaterial({ color, roughness, metalness });
}

function block(parent, size, color, position, options = {}) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(size[0], size[1], size[2]), mat(color, options.roughness, options.metalness));
  mesh.position.set(position[0], position[1], position[2]);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  if (options.rotation) mesh.rotation.set(options.rotation[0], options.rotation[1], options.rotation[2]);
  parent.add(mesh);
  return mesh;
}

function pixel(parent, size, color, position) {
  const mesh = block(parent, size, color, position, { roughness: .62 });
  mesh.castShadow = false;
  return mesh;
}

function zombiePatch(parent, size, color, position, rotation) {
  const mesh = block(parent, size, color, position, { roughness: .86 });
  mesh.castShadow = false;
  if (rotation) mesh.rotation.set(rotation[0], rotation[1], rotation[2]);
  return mesh;
}

function disk(parent, radius, depth, color, position) {
  const geometry = new THREE.CylinderGeometry(radius, radius, depth, 24);
  const mesh = new THREE.Mesh(geometry, mat(color, .58, .04));
  mesh.position.set(position[0], position[1], position[2]);
  mesh.rotation.x = Math.PI / 2;
  mesh.castShadow = false;
  parent.add(mesh);
  return mesh;
}

function addFace(root, config, headY, headDepth) {
  const z = (config.spiderBoss ? .68 : 0) + headDepth / 2 + .012;
  const eyeY = headY + (config.boss || config.spiderBoss ? .05 : .03);
  if (config.id === "julie") {
    disk(root, .075, .035, config.eyes, [-.17, eyeY + .02, z + .008]);
    disk(root, .075, .035, config.eyes, [.17, eyeY + .02, z + .008]);
    pixel(root, [.34, .045, .038], 0x111111, [0, headY - .18, z + .004]);
    return;
  }
  if (config.zombie) {
    pixel(root, [.22, .075, .04], 0x111111, [-.18, eyeY + .02, z + .006]);
    pixel(root, [.22, .075, .04], 0x111111, [.18, eyeY + .02, z + .006]);
    pixel(root, [.46, .075, .04], 0x172015, [0, headY - .18, z + .004]);
    pixel(root, [.1, .07, .042], 0x4f7744, [-.19, headY - .14, z + .01]);
    pixel(root, [.1, .07, .042], 0x4f7744, [.04, headY - .16, z + .01]);
    return;
  }
  pixel(root, [.13, .13, .035], config.eyes, [-.16, eyeY, z]);
  pixel(root, [.13, .13, .035], config.eyes, [.16, eyeY, z]);

  if (config.mouth === "teeth") {
    pixel(root, [.48, .08, .038], 0x111111, [0, headY - .18, z]);
    for (let i = 0; i < 4; i++) pixel(root, [.07, .09, .04], 0xffffff, [-.18 + i * .12, headY - .13, z + .004]);
  } else if (config.mouth === "angry") {
    const leftBrow = pixel(root, [.24, .045, .04], 0x111111, [-.17, headY + .16, z + .006]);
    leftBrow.rotation.z = -.3;
    const rightBrow = pixel(root, [.24, .045, .04], 0x111111, [.17, headY + .16, z + .006]);
    rightBrow.rotation.z = .3;
    const mouth = pixel(root, [.34, .06, .038], 0x111111, [0, headY - .2, z]);
    mouth.rotation.z = .08;
  } else if (config.mouth === "smile") {
    pixel(root, [.34, .055, .038], 0x111111, [0, headY - .19, z]);
    pixel(root, [.065, .07, .038], 0x111111, [-.2, headY - .15, z]);
    pixel(root, [.065, .07, .038], 0x111111, [.2, headY - .15, z]);
  } else {
    pixel(root, [.3, .055, .038], 0x111111, [0, headY - .18, z]);
  }
}

function addHair(root, config, headY, headSize) {
  const topY = headY + headSize[1] / 2 + .04;
  const hairDepth = config.id === "marc" ? headSize[2] + .12 : headSize[2] + .05;
  if (!config.zombie) block(root, [headSize[0] + .06, .12, hairDepth], config.hair, [0, topY, 0]);
  if (config.id === "davide") {
    block(root, [.96, .16, hairDepth + .08], config.hair, [-.08, topY + .02, .01], { rotation: [0, 0, -.16] });
    block(root, [.62, .24, .18], config.hair, [-.26, topY - .03, .29], { rotation: [0, 0, -.48] });
    block(root, [.5, .14, .16], config.hair, [.28, topY - .02, .26], { rotation: [0, 0, .25] });
    block(root, [.18, .34, .14], config.hair, [-.42, topY + .02, .08], { rotation: [0, 0, -.3] });
  }
  if (config.id === "julie") {
    block(root, [.07, .36, .07], 0x20272c, [0, topY + .2, 0]);
    const receiver = new THREE.Mesh(new THREE.SphereGeometry(.12, 16, 12), mat(config.eyes, .55, .08));
    receiver.position.set(0, topY + .42, 0);
    receiver.castShadow = true;
    root.add(receiver);
    block(root, [.2, .14, .18], config.hair, [-.48, topY - .06, .1], { rotation: [0, 0, -.18] });
    block(root, [.2, .14, .18], config.hair, [.48, topY - .06, .1], { rotation: [0, 0, .18] });
    const leftBraid = new THREE.Group();
    leftBraid.position.set(-.72, topY - .04, .06);
    leftBraid.rotation.z = .12;
    root.add(leftBraid);
    const rightBraid = new THREE.Group();
    rightBraid.position.set(.72, topY - .04, .06);
    rightBraid.rotation.z = -.12;
    root.add(rightBraid);
    for (let i = 0; i < 5; i++) {
      const size = .18 + i * .015;
      block(leftBraid, [size, .18, .16], config.hair, [-.03 - i * .015, -.16 - i * .17, .02]);
      block(rightBraid, [size, .18, .16], config.hair, [.03 + i * .015, -.16 - i * .17, .02]);
    }
  }
  if (config.id === "olivier" || config.boss) {
    for (let i = 0; i < 5; i++) {
      const spike = block(root, [.08, .28 + i * .025, .1], config.hair, [-.28 + i * .14, topY + .15, .02]);
      spike.rotation.z = -.18 + i * .09;
    }
  }
}

function makeLimb(root, config, side, type, y, length, thickness) {
  const pivot = new THREE.Group();
  const shoulderSpread = config.boss ? .72 : config.id === "marc" && type === "arm" ? .67 : config.robot && type === "arm" ? .68 : .61;
  pivot.position.set(side === "left" ? -shoulderSpread : shoulderSpread, y, 0);
  root.add(pivot);
  block(pivot, [thickness, length, thickness], type === "arm" ? config.hand : config.pants, [0, -length / 2, 0]);
  return pivot;
}

function addWeapon(handPivot, type, side = "right") {
  if (!type) return;
  const group = new THREE.Group();
  group.position.set(0, -.72, .02);
  handPivot.add(group);
  const direction = side === "left" ? -1 : 1;

  if (type === "sword") {
    block(group, [.07, 1.1, .07], 0xdfe7ef, [direction * .22, -.18, .12], { roughness: .35, metalness: .42, rotation: [0, 0, direction * -.48] });
    block(group, [.38, .07, .09], 0x1c1c1c, [direction * .04, .21, .12], { rotation: [0, 0, direction * -.48] });
  } else if (type === "pickaxe") {
    block(group, [.07, .86, .07], 0x7a5434, [direction * .15, -.08, .1], { rotation: [0, 0, direction * -.28] });
    block(group, [.62, .08, .08], 0xb9c0c8, [direction * .06, .34, .1], { roughness: .42, metalness: .28, rotation: [0, 0, direction * -.28] });
  } else if (type === "club") {
    block(group, [.13, .84, .13], 0x6a442e, [direction * .16, -.1, .1], { rotation: [0, 0, direction * -.35] });
    block(group, [.28, .26, .2], 0x8a5633, [direction * .33, .22, .1], { rotation: [0, 0, direction * -.35] });
  } else if (type === "bossBlade") {
    block(group, [.1, 1.48, .09], 0x111111, [direction * .32, -.34, .08], { rotation: [0, 0, direction * -.5] });
    block(group, [.32, .16, .11], 0xd8d8d8, [direction * .62, -.95, .08], { roughness: .36, metalness: .35, rotation: [0, 0, direction * -.5] });
  }
}

function makeSpiderLeg(root, config, side, z, index) {
  const direction = side === "left" ? -1 : 1;
  const pivot = new THREE.Group();
  pivot.position.set(direction * .62, 1.12, z);
  root.add(pivot);

  const angle = side === "left" ? .82 : -.82;
  const upper = block(pivot, [.22, .78, .22], config.hand, [direction * .34, -.12, 0], { rotation: [0, 0, angle] });
  const lower = block(pivot, [.2, .76, .2], config.hand, [direction * .78, -.5, 0], { rotation: [0, 0, -angle * .74] });
  const foot = block(pivot, [.34, .16, .22], config.pants, [direction * 1.06, -.84, 0], { rotation: [0, 0, -angle * .35] });

  pixel(upper, [.12, .2, .035], 0xc4d0c1, [0, -.08, .13]);
  pixel(lower, [.1, .22, .035], 0x7c8f80, [0, -.1, .12]);

  return {
    pivot,
    upper,
    lower,
    foot,
    side,
    index,
    basePivotX: pivot.rotation.x,
    basePivotZ: pivot.rotation.z,
    baseUpperZ: upper.rotation.z,
    baseLowerZ: lower.rotation.z,
    baseFootZ: foot.rotation.z
  };
}

function buildSpiderBoss(config) {
  const root = new THREE.Group();
  root.scale.setScalar(config.scale);

  const body = block(root, [1.72, .7, 1.12], config.shirt, [0, 1.05, 0], { roughness: .86 });
  block(root, [1.16, .46, .92], 0x6b5546, [0, 1.1, -.08], { roughness: .9 });
  block(root, [.92, .22, 1.02], 0x2b2520, [0, 1.48, -.02], { roughness: .82 });

  const headY = 1.62;
  const head = block(root, [.72, .62, .58], config.skin, [0, headY, .68]);
  block(root, [.86, .13, .62], config.hair, [0, headY + .36, .68]);
  for (let i = 0; i < 5; i++) {
    const spike = block(root, [.07, .25 + i * .02, .1], config.hair, [-.28 + i * .14, headY + .5, .69]);
    spike.rotation.z = -.18 + i * .09;
  }
  addFace(root, config, headY, .58);

  pixel(root, [.54, .08, .045], 0x111111, [0, 1.14, .6]);
  pixel(root, [.38, .06, .045], 0x111111, [0, .96, .6]);
  pixel(root, [.16, .16, .04], 0xb64a32, [-.46, 1.12, .61]);
  pixel(root, [.12, .2, .04], 0xd07635, [.48, 1.22, .61]);
  pixel(root, [.18, .13, .04], 0x2b2520, [.08, .82, .61]);

  const spiderLegs = [];
  [-.52, 0, .52].forEach((z, index) => {
    spiderLegs.push(makeSpiderLeg(root, config, "left", z, index));
    spiderLegs.push(makeSpiderLeg(root, config, "right", z, index));
  });

  return { root, parts: { body, head, spiderLegs }, config };
}

function buildBlockCharacter(config) {
  if (config.spiderBoss) return buildSpiderBoss(config);

  const root = new THREE.Group();
  const isMarc = config.id === "marc";
  root.scale.setScalar(config.scale);
  root.rotation.z = config.forwardLean ? -.04 : 0;

  const bodySize = config.boss ? [1.28, 1.08, .52] : config.robot ? [1.18, .92, .5] : isMarc ? [.94, .98, .48] : [.88, .95, .48];
  const headSize = config.boss ? [.72, .72, .58] : config.robot ? [.78, .66, .58] : isMarc ? [.74, .74, .48] : [.68, .72, .58];
  const bodyY = config.boss ? 1.35 : 1.27;
  const headY = config.boss ? 2.33 : 2.12;

  const body = block(root, bodySize, config.shirt, [0, bodyY, 0]);
  block(root, [.2, .28, .22], config.skin, [0, headY - .52, 0]);
  const head = block(root, headSize, config.skin, [0, headY, 0]);
  addHair(root, config, headY, headSize);
  addFace(root, config, headY, headSize[2]);

  if (config.zombie) {
    const headZ = headSize[2] / 2 + .018;
    const headX = headSize[0] / 2 + .018;
    pixel(root, [.22, .18, .04], 0x4f7a3e, [-.2, headY + .22, headZ]);
    pixel(root, [.18, .16, .04], 0x86ad62, [.18, headY + .16, headZ + .004]);
    pixel(root, [.24, .2, .04], 0x567f42, [.23, headY - .04, headZ + .006]);
    pixel(root, [.16, .22, .04], 0x3f6335, [-.27, headY - .17, headZ + .004]);
    zombiePatch(root, [.04, .2, .18], 0x456d37, [-headX, headY + .18, .12]);
    zombiePatch(root, [.04, .16, .24], 0x86aa62, [headX, headY + .08, -.08]);
    zombiePatch(root, [.04, .26, .16], 0x395c31, [headX, headY - .2, .16]);
    zombiePatch(root, [.2, .18, .04], 0x4a733a, [-.19, headY + .12, -headZ]);
    zombiePatch(root, [.16, .24, .04], 0x7da25a, [.2, headY - .14, -headZ - .004]);
    pixel(root, [.18, .16, .04], 0x3f6335, [-.62, 1.35, .16]);
    pixel(root, [.16, .2, .04], 0x79a25b, [.62, 1.22, .16]);
    pixel(root, [.16, .18, .04], 0x5d8449, [-.12, bodyY + .1, bodySize[2] / 2 + .018]);
  }

  if (config.robot) {
    if (config.id === "julie") {
      const frontZ = bodySize[2] / 2 + .018;
      pixel(root, [.52, .55, .045], config.pants, [0, bodyY - .12, frontZ]);
      pixel(root, [.09, .76, .045], config.pants, [-.28, bodyY + .08, frontZ + .006]);
      pixel(root, [.09, .76, .045], config.pants, [.28, bodyY + .08, frontZ + .006]);
      pixel(root, [.16, .08, .045], 0xd8f6ff, [-.28, bodyY + .42, frontZ + .012]);
      pixel(root, [.16, .08, .045], 0xd8f6ff, [.28, bodyY + .42, frontZ + .012]);
    } else {
      pixel(root, [.08, .24, .04], 0x7edbff, [-.5, 1.3, .27]);
      pixel(root, [.08, .24, .04], 0x7edbff, [.5, 1.3, .27]);
      pixel(root, [.12, .12, .04], 0x7edbff, [0, 1.35, .28]);
    }
  }
  if (config.boss) {
    pixel(root, [.84, .12, .04], 0x111111, [0, 1.62, .28]);
    pixel(root, [.65, .06, .04], 0x111111, [0, 1.4, .28]);
  }

  const armLength = config.boss ? 1.02 : config.zombie ? 1.22 : .92;
  const legLength = config.boss ? .86 : .82;
  const armThickness = config.boss ? .34 : isMarc ? .46 : config.robot ? .31 : .3;
  const legThickness = config.boss ? .36 : isMarc ? .44 : .32;
  const armY = config.boss ? 1.72 : config.zombie ? 1.76 : 1.65;
  const leftArm = makeLimb(root, config, "left", "arm", armY, armLength, armThickness);
  const rightArm = makeLimb(root, config, "right", "arm", armY, armLength, armThickness);
  const leftLeg = makeLimb(root, config, "left", "leg", .84, legLength, legThickness);
  const rightLeg = makeLimb(root, config, "right", "leg", .84, legLength, legThickness);
  leftLeg.position.x = config.boss ? -.32 : isMarc ? -.27 : -.24;
  rightLeg.position.x = config.boss ? .32 : isMarc ? .27 : .24;
  if (config.zombie) {
    leftArm.rotation.x = -.75;
    rightArm.rotation.x = -.75;
    const armFrontZ = armThickness / 2 + .012;
    const armSideX = armThickness / 2 + .012;
    zombiePatch(leftArm, [.16, .24, .035], 0x3f6b35, [0, -.24, armFrontZ]);
    zombiePatch(leftArm, [.2, .18, .035], 0x83a85e, [0, -.62, armFrontZ + .002]);
    zombiePatch(leftArm, [.035, .22, .16], 0x507c40, [-armSideX, -.42, -.04]);
    zombiePatch(leftArm, [.035, .18, .2], 0x385f31, [armSideX, -.86, .02]);
    zombiePatch(rightArm, [.18, .2, .035], 0x3b6632, [0, -.3, armFrontZ]);
    zombiePatch(rightArm, [.14, .26, .035], 0x86aa61, [0, -.74, armFrontZ + .002]);
    zombiePatch(rightArm, [.035, .2, .18], 0x527f40, [armSideX, -.5, -.05]);
    zombiePatch(rightArm, [.035, .16, .22], 0x34592e, [-armSideX, -.95, .03]);
    const legFrontZ = legThickness / 2 + .018;
    const legSideX = legThickness / 2 + .018;
    zombiePatch(leftLeg, [.16, .18, .04], 0x3f6b35, [0, -.28, legFrontZ]);
    zombiePatch(leftLeg, [.2, .16, .04], 0x83a85e, [0, -.58, legFrontZ + .004]);
    zombiePatch(leftLeg, [.04, .18, .16], 0x507c40, [-legSideX, -.46, -.03]);
    zombiePatch(rightLeg, [.18, .22, .04], 0x3b6632, [0, -.34, legFrontZ]);
    zombiePatch(rightLeg, [.14, .18, .04], 0x86aa61, [0, -.66, legFrontZ + .004]);
    zombiePatch(rightLeg, [.04, .2, .18], 0x34592e, [legSideX, -.5, .02]);
  }
  // Character list view intentionally shows characters without handheld weapons.

  let extraLeft = null;
  let extraRight = null;
  if (config.boss) {
    extraLeft = makeLimb(root, config, "left", "arm", 1.36, 1.08, .3);
    extraRight = makeLimb(root, config, "right", "arm", 1.36, 1.08, .3);
    extraLeft.position.x = -1.16;
    extraRight.position.x = 1.16;
  }

  return { root, parts: { body, head, leftArm, rightArm, leftLeg, rightLeg, extraLeft, extraRight }, config };
}

function createScene(canvas, config) {
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, 1, .1, 40);
  camera.position.set(0, config.spiderBoss ? 2.15 : 2.45, config.boss ? 7.2 : config.spiderBoss ? 6.8 : 6.4);
  camera.lookAt(0, config.spiderBoss ? 1.05 : 1.3, 0);

  scene.add(new THREE.HemisphereLight(0xffffff, 0x6d5430, 1.9));
  const key = new THREE.DirectionalLight(0xffffff, 2.4);
  key.position.set(4, 6, 4);
  key.castShadow = true;
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xf5dfb4, .8);
  fill.position.set(-3, 3, 2);
  scene.add(fill);

  const ground = block(scene, [5.1, .22, 4.2], 0x80643c, [0, -.13, 0], { roughness: .9 });
  ground.receiveShadow = true;
  ground.castShadow = false;

  const model = buildBlockCharacter(config);
  model.root.position.y = .04;
  model.root.rotation.y = config.boss ? -.24 : config.spiderBoss ? .14 : .18;
  scene.add(model.root);

  return { renderer, scene, camera, model, rotation: config.boss ? -.24 : config.spiderBoss ? .14 : .18, targetRotation: config.boss ? -.24 : config.spiderBoss ? .14 : .18, dragging: false, lastX: 0 };
}

function resizeRenderer(entry, viewer) {
  const rect = viewer.getBoundingClientRect();
  const width = Math.max(1, Math.floor(rect.width));
  const height = Math.max(1, Math.floor(rect.height));
  const canvas = entry.renderer.domElement;
  if (canvas.width !== width || canvas.height !== height) {
    entry.renderer.setSize(width, height, false);
    entry.camera.aspect = width / height;
    entry.camera.updateProjectionMatrix();
  }
}

function attackPulse(elapsed, offset = 0, period = 3.15, width = .34) {
  const t = ((elapsed + offset) % period) / period;
  if (t > width) return 0;
  const wave = Math.sin((t / width) * Math.PI);
  return wave * wave;
}

function animateModel(model, elapsed, mode = "walk", modeElapsed = elapsed) {
  const { config, parts, root } = model;
  const attacking = mode === "attack";
  if (config.spiderBoss) {
    const crawl = Math.sin(elapsed * 4.1);
    const shootEase = attacking ? attackPulse(modeElapsed, 0, 1.45, .82) : 0;
    root.position.y = .02 + Math.abs(crawl) * .055;
    root.position.z = -shootEase * .14;
    parts.body.rotation.z = crawl * .032;
    parts.body.rotation.x = -shootEase * .12;
    parts.head.rotation.z = -crawl * .04;
    parts.head.rotation.x = -shootEase * .16;
    parts.spiderLegs.forEach((leg, i) => {
      const sideOffset = leg.side === "left" ? 0 : Math.PI;
      const rowOffset = leg.index * 1.35;
      const phase = elapsed * 4.6 + rowOffset + sideOffset;
      const stride = Math.sin(phase);
      const stepLift = Math.max(0, Math.sin(phase + Math.PI / 2));
      const stepEase = stepLift * stepLift * (3 - 2 * stepLift);
      const sideDirection = leg.side === "left" ? 1 : -1;
      const rowPower = 1.05;
      const liftPower = 1;
      leg.pivot.rotation.z = leg.basePivotZ + stride * .16 * rowPower + stepEase * .22 * sideDirection;
      leg.pivot.rotation.x = leg.basePivotX + stride * .1 * rowPower - stepEase * .18 * liftPower;
      leg.upper.rotation.z = leg.baseUpperZ + stride * .11 * rowPower * sideDirection;
      leg.lower.rotation.z = leg.baseLowerZ + (stride * .36 + stepEase * .42 * liftPower) * rowPower * -sideDirection;
      leg.foot.rotation.z = leg.baseFootZ + stride * .16 * rowPower + stepEase * .2 * liftPower * sideDirection;
    });
    parts.spiderLegs[0].pivot.rotation.z -= shootEase * .54;
    parts.spiderLegs[1].pivot.rotation.z += shootEase * .54;
    parts.spiderLegs[0].pivot.rotation.x -= shootEase * .3;
    parts.spiderLegs[1].pivot.rotation.x -= shootEase * .3;
    parts.spiderLegs[0].lower.rotation.z += shootEase * .26;
    parts.spiderLegs[1].lower.rotation.z -= shootEase * .26;
    return;
  }
  const speed = config.boss ? 2.6 : config.zombie ? 3.1 : config.id === "davide" ? 4.8 : 4.1;
  const swing = Math.sin(elapsed * speed);
  const counter = Math.cos(elapsed * speed);
  const weight = config.boss ? .5 : config.zombie ? .55 : 1;

  root.position.y = .04 + Math.abs(swing) * .06 * weight;
  parts.body.rotation.z = swing * .025 * weight;
  parts.head.rotation.z = -swing * .035 * weight;
  if (config.zombie) {
    parts.leftArm.rotation.x = -.78 + swing * .1;
    parts.rightArm.rotation.x = -.78 - swing * .1;
  } else {
    parts.leftArm.rotation.x = swing * .66 * weight;
    parts.rightArm.rotation.x = -swing * .66 * weight;
  }
  parts.leftLeg.rotation.x = -swing * .58 * weight;
  parts.rightLeg.rotation.x = swing * .58 * weight;
  if (parts.extraLeft) parts.extraLeft.rotation.x = counter * .46;
  if (parts.extraRight) parts.extraRight.rotation.x = -counter * .46;

  const attack = attacking ? attackPulse(modeElapsed, 0, 1.35, .82) : 0;
  if (config.id === "marc") {
    root.position.z = -attack * .06;
    parts.body.rotation.z += attack * .08;
    parts.rightArm.rotation.x = -1.15 * attack + swing * .22;
    parts.rightArm.rotation.z = -.58 * attack;
    parts.leftArm.rotation.x += attack * .28;
    parts.head.rotation.z -= attack * .05;
  } else if (config.id === "davide") {
    root.position.z = -attack * .12;
    root.rotation.z = -.04 - attack * .08;
    parts.body.rotation.z += attack * .16;
    parts.rightArm.rotation.x = -1.42 * attack + swing * .16;
    parts.rightArm.rotation.z = -.78 * attack;
    parts.leftArm.rotation.x += attack * .38;
    parts.head.rotation.z -= attack * .1;
  } else if (config.id === "julie") {
    root.position.z = -attack * .08;
    parts.body.rotation.x = -attack * .1;
    parts.head.rotation.x = -attack * .06;
    parts.leftArm.rotation.x = -1.05 * attack + swing * .12;
    parts.rightArm.rotation.x = -1.05 * attack - swing * .12;
    parts.leftArm.rotation.z = attack * .22;
    parts.rightArm.rotation.z = -attack * .22;
  } else if (config.id === "olivier") {
    root.position.z = -attack * .16;
    root.rotation.z = -.04 - attack * .12;
    parts.body.rotation.x = -attack * .16;
    parts.head.rotation.x = -attack * .22;
    parts.leftArm.rotation.x = -1.15 * attack + swing * .18;
    parts.rightArm.rotation.x = -1.15 * attack - swing * .18;
    parts.leftArm.rotation.z = attack * .34;
    parts.rightArm.rotation.z = -attack * .34;
  } else if (config.zombie) {
    root.position.z = -attack * .12;
    parts.body.rotation.x = -attack * .12;
    parts.head.rotation.x = -attack * .16;
    parts.leftArm.rotation.x = -.78 - attack * .72 + swing * .06;
    parts.rightArm.rotation.x = -.78 - attack * .72 - swing * .06;
    parts.leftArm.rotation.z = attack * .2;
    parts.rightArm.rotation.z = -attack * .2;
  } else if (config.boss) {
    root.position.y = .04 + Math.abs(swing) * .04 + attack * .08;
    parts.body.rotation.x = -attack * .1;
    parts.head.rotation.x = -attack * .08;
    parts.leftArm.rotation.x = -attack * 1.05 + swing * .12;
    parts.rightArm.rotation.x = -attack * 1.05 - swing * .12;
    if (parts.extraLeft) {
      parts.extraLeft.rotation.x = -attack * 1.25 + counter * .22;
      parts.extraLeft.rotation.z = attack * .3;
    }
    if (parts.extraRight) {
      parts.extraRight.rotation.x = -attack * 1.25 - counter * .22;
      parts.extraRight.rotation.z = -attack * .3;
    }
  }
}

function attachDrag(viewer, entry) {
  viewer.addEventListener("pointerdown", event => {
    viewer.classList.add("dragging");
    entry.dragging = true;
    entry.lastX = event.clientX;
    entry.lastY = event.clientY;
    entry.dragMode = "";
    viewer.setPointerCapture?.(event.pointerId);
  });
  viewer.addEventListener("pointermove", event => {
    if (!entry.dragging) return;
    const delta = event.clientX - entry.lastX;
    const deltaY = event.clientY - entry.lastY;
    entry.lastX = event.clientX;
    entry.lastY = event.clientY;
    if (!entry.dragMode) {
      if (Math.abs(delta) < 4 && Math.abs(deltaY) < 4) return;
      entry.dragMode = Math.abs(deltaY) > Math.abs(delta) ? "scroll" : "rotate";
    }
    if (entry.dragMode === "scroll") {
      window.scrollBy(0, -deltaY);
      return;
    }
    entry.targetRotation += delta * .012;
  });
  const end = () => {
    viewer.classList.remove("dragging");
    entry.dragging = false;
    entry.dragMode = "";
  };
  viewer.addEventListener("pointerup", end);
  viewer.addEventListener("pointercancel", end);
}

characters.forEach(config => {
  const card = document.querySelector('.card[data-id="' + config.id + '"]');
  if (!card) return;
  const viewer = card.querySelector(".viewer");
  const canvas = card.querySelector("canvas");
  try {
    const entry = createScene(canvas, config);
    entry.mode = "walk";
    entry.modeStartedAt = 0;
    viewer.classList.add("webgl-ready");
    attachDrag(viewer, entry);
    card.querySelectorAll(".animation-button").forEach(button => {
      button.addEventListener("click", () => {
        entry.mode = button.dataset.animation || "walk";
        entry.modeStartedAt = clock.getElapsedTime();
        card.querySelectorAll(".animation-button").forEach(item => {
          item.classList.toggle("active", item === button);
        });
      });
    });
    liveCards.push({ viewer, entry });
  } catch (error) {
    console.error(error);
  }
});

const clock = new THREE.Clock();

function render() {
  const elapsed = clock.getElapsedTime();
  for (const { viewer, entry } of liveCards) {
    resizeRenderer(entry, viewer);
    entry.rotation += (entry.targetRotation - entry.rotation) * .18;
    if (!entry.dragging) entry.targetRotation += .0023;
    entry.model.root.rotation.y = entry.rotation;
    animateModel(entry.model, elapsed, entry.mode, elapsed - entry.modeStartedAt);
    entry.renderer.render(entry.scene, entry.camera);
  }
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
