<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Block Character Cards | Rocket Boss Game</title>
<style>
:root {
  --ink: #161411;
  --line: #222018;
  --muted: #625e53;
  --ground: #8c7045;
}

* { box-sizing: border-box; }

html,
body {
  margin: 0;
  min-height: 100%;
  color: var(--ink);
  font-family: Arial, "Microsoft YaHei", sans-serif;
  background:
    radial-gradient(circle at 14% 8%, rgba(47, 143, 114, .14), transparent 25%),
    radial-gradient(circle at 90% 7%, rgba(228, 77, 38, .15), transparent 27%),
    linear-gradient(180deg, #f4ecd8 0%, #d5bf8d 100%);
}

body { overflow-x: hidden; }

.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px;
}

header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: end;
  padding-bottom: 18px;
  border-bottom: 3px solid var(--line);
}

h1 {
  margin: 0;
  font-size: clamp(32px, 5vw, 56px);
  line-height: 1;
}

.subtitle {
  margin: 10px 0 0;
  max-width: 780px;
  color: var(--muted);
  font-size: 16px;
}

.badge {
  border: 2px solid var(--line);
  border-radius: 8px;
  background: #fff;
  padding: 9px 12px;
  font-weight: 900;
  white-space: nowrap;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
  margin-top: 22px;
}

.card {
  overflow: hidden;
  background: rgba(255, 250, 240, .94);
  border: 3px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 14px 34px rgba(38, 30, 13, .18);
}

.viewer {
  position: relative;
  height: 370px;
  border-bottom: 3px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255,255,255,.6) 0%, rgba(245,238,219,.18) 54%, transparent 55%),
    linear-gradient(180deg, #d7c69f 0%, #c7b27d 62%, var(--ground) 62%, #715834 100%);
  cursor: grab;
  touch-action: none;
  user-select: none;
}

.viewer.dragging { cursor: grabbing; }

.viewer canvas {
  position: absolute;
  inset: 0;
  z-index: 1;
  display: block;
  width: 100%;
  height: 100%;
}

.drag-hint {
  position: absolute;
  left: 10px;
  bottom: 10px;
  z-index: 3;
  border: 2px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,.9);
  padding: 4px 9px;
  font-size: 12px;
  font-weight: 900;
}

.fallback-model {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: grid;
  place-items: end center;
  padding-bottom: 52px;
  perspective: 760px;
  pointer-events: none;
}

.webgl-ready .fallback-model {
  display: none;
}

.fallback-shadow {
  position: absolute;
  left: 50%;
  bottom: 58px;
  width: 148px;
  height: 28px;
  transform: translateX(-50%) skewX(-16deg);
  background: rgba(42, 31, 16, .24);
}

.block-person {
  position: relative;
  width: 170px;
  height: 240px;
  transform-origin: 50% 88%;
  transform-style: preserve-3d;
  animation: css-walk .82s ease-in-out infinite;
}

.block-person.boss-css {
  width: 230px;
  height: 278px;
  animation-duration: 1s;
}

.marc-css {
  transform-style: flat;
}

.marc-css .part {
  box-shadow: inset -10px -8px 0 rgba(0,0,0,.14), 0 7px 12px rgba(0,0,0,.14);
}

.marc-css.marc-side {
  animation-name: css-side-walk;
}

.marc-css.marc-side .head {
  width: 46px;
  height: 72px;
  margin-left: -23px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.12), transparent 42%),
    var(--skin);
}

.marc-css.marc-side .hair {
  width: 54px;
  height: 13px;
  margin-left: -27px;
  background: var(--hair);
}

.marc-css.marc-side .body {
  top: 89px;
  width: 44px;
  height: 96px;
  margin-left: -22px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.22), transparent 42%),
    var(--shirt);
}

.marc-css.marc-side .arm {
  top: 92px;
  width: 34px;
  height: 108px;
  margin-left: -31px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.16), transparent 42%),
    var(--hand);
}

.marc-css.marc-side .arm.right {
  display: none;
}

.marc-css.marc-side .leg {
  top: 182px;
  width: 32px;
  height: 66px;
  margin-left: -17px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.2), transparent 42%),
    var(--pants);
}

.marc-css.marc-side .leg.right {
  display: none;
}

.marc-css.marc-side .eye {
  top: 48px;
  width: 8px;
  height: 12px;
  margin-left: -2px;
}

.marc-css.marc-side .eye.right {
  display: none;
}

.marc-css.marc-side .mouth {
  top: 72px;
  width: 16px;
  height: 5px;
  margin-left: -8px;
}

.marc-css.marc-back .eye,
.marc-css.marc-back .mouth {
  display: none;
}

.marc-css.marc-back .head {
  background:
    linear-gradient(90deg, rgba(0,0,0,.12), transparent 22%, transparent 78%, rgba(0,0,0,.12)),
    var(--skin);
}

.marc-css.marc-back .body {
  background:
    linear-gradient(90deg, rgba(0,0,0,.08), transparent 22%, transparent 78%, rgba(0,0,0,.1)),
    var(--shirt);
}

.part {
  position: absolute;
  left: 50%;
  border: 2px solid rgba(20, 18, 14, .76);
  box-shadow: inset -9px -8px 0 rgba(0,0,0,.16), 0 7px 12px rgba(0,0,0,.12);
}

.head {
  top: 18px;
  width: 68px;
  height: 70px;
  margin-left: -34px;
  background: var(--skin);
}

.robot-css .head {
  width: 78px;
  height: 66px;
  margin-left: -39px;
  background: var(--skin);
}

.boss-css .head {
  width: 78px;
  height: 76px;
  margin-left: -39px;
}

.hair {
  top: 11px;
  width: 80px;
  height: 13px;
  margin-left: -40px;
  background: var(--hair);
}

.davide-css .hair {
  transform: rotate(-10deg);
}

.spike {
  top: 0;
  width: 8px;
  height: 34px;
  margin-left: -4px;
  background: var(--hair);
}

.spike.s1 { transform: translateX(-28px) rotate(7deg); }
.spike.s2 { transform: translateX(-14px) rotate(2deg); }
.spike.s3 { transform: translateX(0) rotate(-3deg); }
.spike.s4 { transform: translateX(14px) rotate(3deg); }
.spike.s5 { transform: translateX(28px) rotate(-6deg); }

.body {
  top: 88px;
  width: 88px;
  height: 92px;
  margin-left: -44px;
  background: var(--shirt);
}

.robot-css .body {
  width: 116px;
  height: 86px;
  margin-left: -58px;
  background: var(--shirt);
}

.boss-css .body {
  top: 96px;
  width: 126px;
  height: 112px;
  margin-left: -63px;
}

.arm {
  top: 94px;
  width: 32px;
  height: 96px;
  margin-left: -78px;
  background: var(--hand);
  transform-origin: 50% 8%;
  animation: css-arm-a .82s ease-in-out infinite;
}

.arm.right {
  margin-left: 46px;
  animation-name: css-arm-b;
}

.boss-css .arm {
  top: 112px;
  width: 34px;
  height: 112px;
  margin-left: -106px;
}

.boss-css .arm.right {
  margin-left: 72px;
}

.boss-css .arm.extra-left {
  top: 132px;
  margin-left: -138px;
  transform: rotate(28deg);
}

.boss-css .arm.extra-right {
  top: 132px;
  margin-left: 104px;
  transform: rotate(-28deg);
}

.leg {
  top: 176px;
  width: 30px;
  height: 66px;
  margin-left: -38px;
  background: var(--pants);
  transform-origin: 50% 8%;
  animation: css-leg-a .82s ease-in-out infinite;
}

.leg.right {
  margin-left: 8px;
  animation-name: css-leg-b;
}

.boss-css .leg {
  top: 204px;
  width: 34px;
  height: 70px;
}

.eye,
.mouth,
.tooth,
.core,
.weapon {
  position: absolute;
  left: 50%;
  z-index: 4;
  background: var(--ink);
}

.eye {
  top: 46px;
  width: 12px;
  height: 12px;
  margin-left: -20px;
}

.eye.right { margin-left: 10px; }

.mouth {
  top: 70px;
  width: 32px;
  height: 6px;
  margin-left: -16px;
}

.smile .mouth {
  height: 8px;
  border-bottom: 5px solid var(--ink);
  border-left: 5px solid var(--ink);
  border-right: 5px solid var(--ink);
  background: transparent;
}

.tooth {
  top: 66px;
  width: 8px;
  height: 10px;
  background: #fff;
}

.tooth.t1 { margin-left: -20px; }
.tooth.t2 { margin-left: -7px; }
.tooth.t3 { margin-left: 6px; }
.tooth.t4 { margin-left: 19px; }

.core {
  top: 128px;
  width: 12px;
  height: 12px;
  margin-left: -6px;
  background: #72d8ff;
}

.weapon {
  top: 128px;
  width: 8px;
  height: 88px;
  margin-left: 68px;
  background: var(--weapon);
  transform: rotate(28deg);
}

.sword {
  width: 8px;
  height: 112px;
  margin-left: 70px;
  background: #d8dde2;
  transform: rotate(32deg);
}

.club {
  width: 16px;
  height: 76px;
  margin-left: 65px;
  background: #6a442e;
  transform: rotate(-40deg);
}

.blade-left {
  top: 168px;
  height: 130px;
  margin-left: -110px;
  background: #111;
  transform: rotate(-38deg);
}

.blade-right {
  top: 168px;
  height: 130px;
  margin-left: 106px;
  background: #111;
  transform: rotate(38deg);
}

.meta {
  padding: 14px;
}

.meta h2 {
  margin: 0 0 7px;
  font-size: 24px;
}

.role {
  margin: 0 0 10px;
  color: var(--muted);
  font-size: 13px;
}

.desc {
  min-height: 48px;
  margin: 0;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}

.stat {
  min-width: 0;
  border: 2px solid var(--line);
  border-radius: 6px;
  background: #fff;
  padding: 8px;
  font-size: 12px;
}

.stat strong {
  display: block;
  font-size: 20px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 12px;
}

.pill {
  border: 2px solid var(--line);
  border-radius: 999px;
  background: #fff;
  padding: 4px 8px;
  font-size: 12px;
  font-weight: 900;
}

@keyframes css-walk {
  0%, 100% { transform: translateY(0) rotateZ(-1deg) rotateY(var(--fallback-rotation, 0deg)); }
  50% { transform: translateY(-8px) rotateZ(1deg) rotateY(var(--fallback-rotation, 0deg)); }
}

@keyframes css-side-walk {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

@keyframes css-arm-a {
  0%, 100% { transform: rotate(11deg); }
  50% { transform: rotate(-16deg); }
}

@keyframes css-arm-b {
  0%, 100% { transform: rotate(-16deg); }
  50% { transform: rotate(11deg); }
}

@keyframes css-leg-a {
  0%, 100% { transform: rotate(-12deg); }
  50% { transform: rotate(14deg); }
}

@keyframes css-leg-b {
  0%, 100% { transform: rotate(14deg); }
  50% { transform: rotate(-12deg); }
}

@media (max-width: 980px) {
  header { grid-template-columns: 1fr; }
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

@media (max-width: 640px) {
  .page { padding: 14px; }
  .grid { grid-template-columns: 1fr; }
  .viewer { height: 340px; }
}
</style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <h1>3D Block Character Cards</h1>
      <p class="subtitle">按原设计图重新做成方块角色：方块头、方块身体、细长手脚，并保留每个角色的武器、脸部和 Boss 造型特征。拖动每个角色框可以旋转查看。</p>
    </div>
    <div class="badge">6 block models · drag to rotate</div>
  </header>
  <main class="grid" id="grid" aria-live="polite"></main>
</div>

<script>
(function () {
  window.characterData = [
    { id: "marc", name: "Marc", cssClass: "marc-css", role: "Player · Explorer · Rocket builder", desc: "主角，绿色方块头、白色上衣和粗壮方块四肢，先按真正 3D 方块体比例测试。", pv: "12", atk: "3+", speed: "Medium", tags: ["Player", "Tool", "Rocket"], skin: 0x69a78b, shirt: 0xf4f0e5, pants: 0xcfd5de, hair: 0x202020, hand: 0x4a8b70, eyes: 0x101010, mouth: "flat", weapon: "pickaxe", scale: 1 },
    { id: "davide", name: "Davide", cssClass: "davide-css smile", role: "Enemy · Fast · Sword", desc: "快速近战敌人，绿色脸、黑色斜发和手持剑，保留原画里奔跑攻击的感觉。", pv: "8", atk: "6+", speed: "Fast", tags: ["Enemy", "Sword", "Chase"], skin: 0x78a889, shirt: 0xf0eee8, pants: 0xded8ce, hair: 0x191919, hand: 0x4a8b70, eyes: 0x1c2b6d, mouth: "smile", weapon: "sword", scale: 1.03, forwardLean: true },
    { id: "julie", name: "Julie Robot", cssClass: "robot-css smile", role: "Robot · Guard · Smooth", desc: "机器人角色，方形头和方块肩膀更宽，眼睛和关节带一点蓝色机械发光。", pv: "15", atk: "4+", speed: "Steady", tags: ["Robot", "Guard", "Resource"], skin: 0xc7cdd3, shirt: 0xb8c0c9, pants: 0xbfc5cc, hair: 0x7edbff, hand: 0x9da7b3, eyes: 0x213040, mouth: "smile", scale: 1, robot: true },
    { id: "olivier", name: "Olivier", cssClass: "teeth-css", role: "Enemy · Ambush · High damage", desc: "伏击敌人，绿色怪物脸、黑发和锯齿嘴，外形更接近原设计图中的可怕表情。", pv: "7", atk: "7+", speed: "Quick", tags: ["Enemy", "Ambush", "Damage"], skin: 0x82b48b, shirt: 0xf1eee5, pants: 0xe3ddd3, hair: 0x171717, hand: 0x4f9474, eyes: 0x101010, mouth: "teeth", weapon: "club", scale: 1.04, forwardLean: true },
    { id: "zombie", name: "Zombie", cssClass: "", role: "Enemy · Common · Map patrol", desc: "普通世界敌人，灰绿皮肤、暗绿衣服和拖沓步态，用方块体型表现低速巡逻。", pv: "7", atk: "5", speed: "Slow", tags: ["Enemy", "Patrol", "Slow"], skin: 0x8fb07a, shirt: 0x556b46, pants: 0x3f4b39, hair: 0x713b3b, hand: 0x82a96f, eyes: 0x111111, mouth: "flat", scale: .98, zombie: true },
    { id: "boss", name: "Boss", cssClass: "boss-css teeth-css", role: "Final Boss · Volcano · Multi-arm", desc: "最终 Boss，按原画做成巨大方块身体、四条折臂、尖牙脸和两把长武器。", pv: "70", atk: "40", speed: "Heavy", tags: ["Boss", "Volcano", "Lava"], skin: 0xaec1b4, shirt: 0xf1eee5, pants: 0x222222, hair: 0x151515, hand: 0xaec1b4, eyes: 0x101010, mouth: "teeth", scale: 1.23, boss: true }
  ];

  function hex(color) {
    return "#" + color.toString(16).padStart(6, "0");
  }

  function faceHtml(config) {
    var teeth = config.mouth === "teeth" ? '<span class="tooth t1"></span><span class="tooth t2"></span><span class="tooth t3"></span><span class="tooth t4"></span>' : "";
    var spikes = (config.id === "olivier" || config.boss) ? '<span class="part spike s1"></span><span class="part spike s2"></span><span class="part spike s3"></span><span class="part spike s4"></span><span class="part spike s5"></span>' : "";
    var core = config.robot ? '<span class="core"></span>' : "";
    return spikes + '<span class="eye"></span><span class="eye right"></span><span class="mouth"></span>' + teeth + core;
  }

  function weaponHtml(config) {
    if (config.weapon === "sword") return '<span class="weapon sword"></span>';
    if (config.weapon === "club") return '<span class="weapon club"></span>';
    if (config.weapon === "pickaxe") return '<span class="weapon"></span>';
    if (config.boss) return '<span class="weapon blade-left"></span><span class="weapon blade-right"></span>';
    return "";
  }

  function cardHtml(config) {
    var style = "--skin:" + hex(config.skin) + ";--shirt:" + hex(config.shirt) + ";--pants:" + hex(config.pants) + ";--hair:" + hex(config.hair) + ";--hand:" + hex(config.hand) + ";--weapon:#7a5434;";
    var extraArms = config.boss ? '<span class="part arm extra-left"></span><span class="part arm extra-right"></span>' : "";
    return '<article class="card" data-id="' + config.id + '">' +
      '<div class="viewer" data-id="' + config.id + '">' +
        '<canvas aria-label="' + config.name + ' block 3D model"></canvas>' +
        '<div class="fallback-model">' +
          '<span class="fallback-shadow"></span>' +
          '<div class="block-person ' + config.cssClass + '" style="' + style + '">' +
            '<span class="part leg"></span><span class="part leg right"></span>' +
            '<span class="part body"></span><span class="part arm"></span><span class="part arm right"></span>' + extraArms +
            '<span class="part head"></span><span class="part hair"></span>' + faceHtml(config) + weaponHtml(config) +
          '</div>' +
        '</div>' +
        '<div class="drag-hint">Drag to rotate</div>' +
      '</div>' +
      '<div class="meta"><h2>' + config.name + '</h2><p class="role">' + config.role + '</p><p class="desc">' + config.desc + '</p>' +
      '<div class="stats"><div class="stat"><strong>' + config.pv + '</strong>PV</div><div class="stat"><strong>' + config.atk + '</strong>Attack</div><div class="stat"><strong>' + config.speed + '</strong>Speed</div></div>' +
      '<div class="tags">' + config.tags.map(function (tag) { return '<span class="pill">' + tag + '</span>'; }).join("") + '</div></div></article>';
  }

  var grid = document.getElementById("grid");
  grid.innerHTML = window.characterData.map(cardHtml).join("");

  document.querySelectorAll(".viewer").forEach(function (viewer) {
    var model = viewer.querySelector(".block-person");
    var rotation = 0;
    var dragging = false;
    var lastX = 0;

    function setRotation(value) {
      rotation = value;
      if (!model) return;
      model.style.setProperty("--fallback-rotation", rotation + "deg");
      if (model.classList.contains("marc-css")) {
        var normalized = ((rotation % 360) + 360) % 360;
        var side = (normalized >= 45 && normalized <= 135) || (normalized >= 225 && normalized <= 315);
        var back = normalized > 135 && normalized < 225;
        model.classList.toggle("marc-side", side);
        model.classList.toggle("marc-back", back);
      }
    }

    viewer.addEventListener("pointerdown", function (event) {
      dragging = true;
      lastX = event.clientX;
      viewer.classList.add("dragging");
      if (viewer.setPointerCapture) viewer.setPointerCapture(event.pointerId);
    });

    viewer.addEventListener("pointermove", function (event) {
      if (!dragging) return;
      var delta = event.clientX - lastX;
      lastX = event.clientX;
      setRotation(rotation + delta * .75);
    });

    function endDrag() {
      dragging = false;
      viewer.classList.remove("dragging");
    }

    viewer.addEventListener("pointerup", endDrag);
    viewer.addEventListener("pointercancel", endDrag);
    viewer.addEventListener("lostpointercapture", endDrag);
  });
}());
</script>

<script type="module">
import * as THREE from "./three.module.js";

const characters = window.characterData || [];
const liveCards = [];

function mat(color, roughness = .78, metalness = .02) {
  return new THREE.MeshStandardMaterial({ color, roughness, metalness });
}

function block(parent, size, color, position, options = {}) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(size[0], size[1], size[2]), mat(color, options.roughness, options.metalness));
  mesh.position.set(position[0], position[1], position[2]);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  if (options.rotation) mesh.rotation.set(options.rotation[0], options.rotation[1], options.rotation[2]);
  parent.add(mesh);
  return mesh;
}

function pixel(parent, size, color, position) {
  const mesh = block(parent, size, color, position, { roughness: .62 });
  mesh.castShadow = false;
  return mesh;
}

function addFace(root, config, headY, headDepth) {
  const z = headDepth / 2 + .012;
  const eyeY = headY + (config.boss ? .05 : .03);
  pixel(root, [.13, .13, .035], config.eyes, [-.16, eyeY, z]);
  pixel(root, [.13, .13, .035], config.eyes, [.16, eyeY, z]);

  if (config.mouth === "teeth") {
    pixel(root, [.48, .08, .038], 0x111111, [0, headY - .18, z]);
    for (let i = 0; i < 4; i++) pixel(root, [.07, .09, .04], 0xffffff, [-.18 + i * .12, headY - .13, z + .004]);
  } else if (config.mouth === "smile") {
    pixel(root, [.34, .055, .038], 0x111111, [0, headY - .19, z]);
    pixel(root, [.065, .07, .038], 0x111111, [-.2, headY - .15, z]);
    pixel(root, [.065, .07, .038], 0x111111, [.2, headY - .15, z]);
  } else {
    pixel(root, [.3, .055, .038], 0x111111, [0, headY - .18, z]);
  }
}

function addHair(root, config, headY, headSize) {
  const topY = headY + headSize[1] / 2 + .04;
  const hairDepth = config.id === "marc" ? headSize[2] + .12 : headSize[2] + .05;
  block(root, [headSize[0] + .06, .12, hairDepth], config.hair, [0, topY, 0]);
  if (config.id === "davide") block(root, [.56, .22, .12], config.hair, [-.14, topY - .04, .18], { rotation: [0, 0, -.38] });
  if (config.id === "olivier" || config.boss) {
    for (let i = 0; i < 5; i++) {
      const spike = block(root, [.08, .28 + i * .025, .1], config.hair, [-.28 + i * .14, topY + .15, .02]);
      spike.rotation.z = -.18 + i * .09;
    }
  }
}

function makeLimb(root, config, side, type, y, length, thickness) {
  const pivot = new THREE.Group();
  const shoulderSpread = config.boss ? .72 : config.id === "marc" && type === "arm" ? .67 : config.robot && type === "arm" ? .68 : .61;
  pivot.position.set(side === "left" ? -shoulderSpread : shoulderSpread, y, 0);
  root.add(pivot);
  block(pivot, [thickness, length, thickness], type === "arm" ? config.hand : config.pants, [0, -length / 2, 0]);
  return pivot;
}

function addWeapon(handPivot, type, side = "right") {
  if (!type) return;
  const group = new THREE.Group();
  group.position.set(0, -.72, .02);
  handPivot.add(group);
  const direction = side === "left" ? -1 : 1;

  if (type === "sword") {
    block(group, [.07, 1.1, .07], 0xdfe7ef, [direction * .22, -.18, .12], { roughness: .35, metalness: .42, rotation: [0, 0, direction * -.48] });
    block(group, [.38, .07, .09], 0x1c1c1c, [direction * .04, .21, .12], { rotation: [0, 0, direction * -.48] });
  } else if (type === "pickaxe") {
    block(group, [.07, .86, .07], 0x7a5434, [direction * .15, -.08, .1], { rotation: [0, 0, direction * -.28] });
    block(group, [.62, .08, .08], 0xb9c0c8, [direction * .06, .34, .1], { roughness: .42, metalness: .28, rotation: [0, 0, direction * -.28] });
  } else if (type === "club") {
    block(group, [.13, .84, .13], 0x6a442e, [direction * .16, -.1, .1], { rotation: [0, 0, direction * -.35] });
    block(group, [.28, .26, .2], 0x8a5633, [direction * .33, .22, .1], { rotation: [0, 0, direction * -.35] });
  } else if (type === "bossBlade") {
    block(group, [.1, 1.48, .09], 0x111111, [direction * .32, -.34, .08], { rotation: [0, 0, direction * -.5] });
    block(group, [.32, .16, .11], 0xd8d8d8, [direction * .62, -.95, .08], { roughness: .36, metalness: .35, rotation: [0, 0, direction * -.5] });
  }
}

function buildBlockCharacter(config) {
  const root = new THREE.Group();
  const isMarc = config.id === "marc";
  root.scale.setScalar(config.scale);
  root.rotation.z = config.forwardLean ? -.04 : 0;

  const bodySize = config.boss ? [1.28, 1.08, .52] : config.robot ? [1.18, .92, .5] : isMarc ? [.94, .98, 1.02] : [.88, .95, .48];
  const headSize = config.boss ? [.72, .72, .58] : config.robot ? [.78, .66, .58] : isMarc ? [.74, .74, .88] : [.68, .72, .58];
  const bodyY = config.boss ? 1.35 : 1.27;
  const headY = config.boss ? 2.33 : 2.12;

  const body = block(root, bodySize, config.shirt, [0, bodyY, 0]);
  block(root, [.2, .28, .22], config.skin, [0, headY - .52, 0]);
  const head = block(root, headSize, config.skin, [0, headY, 0]);
  addHair(root, config, headY, headSize);
  addFace(root, config, headY, headSize[2]);

  if (config.robot) {
    pixel(root, [.08, .24, .04], 0x7edbff, [-.5, 1.3, .27]);
    pixel(root, [.08, .24, .04], 0x7edbff, [.5, 1.3, .27]);
    pixel(root, [.12, .12, .04], 0x7edbff, [0, 1.35, .28]);
  }
  if (config.boss) {
    pixel(root, [.84, .12, .04], 0x111111, [0, 1.62, .28]);
    pixel(root, [.65, .06, .04], 0x111111, [0, 1.4, .28]);
  }

  const armLength = config.boss ? 1.02 : .92;
  const legLength = config.boss ? .86 : .82;
  const armThickness = config.boss ? .34 : isMarc ? .46 : config.robot ? .31 : .3;
  const legThickness = config.boss ? .36 : isMarc ? .44 : .32;
  const leftArm = makeLimb(root, config, "left", "arm", config.boss ? 1.72 : 1.65, armLength, armThickness);
  const rightArm = makeLimb(root, config, "right", "arm", config.boss ? 1.72 : 1.65, armLength, armThickness);
  const leftLeg = makeLimb(root, config, "left", "leg", .84, legLength, legThickness);
  const rightLeg = makeLimb(root, config, "right", "leg", .84, legLength, legThickness);
  leftLeg.position.x = config.boss ? -.32 : isMarc ? -.27 : -.24;
  rightLeg.position.x = config.boss ? .32 : isMarc ? .27 : .24;
  if (config.zombie) {
    leftArm.rotation.x = -.75;
    rightArm.rotation.x = -.75;
  }
  addWeapon(rightArm, config.weapon, "right");

  let extraLeft = null;
  let extraRight = null;
  if (config.boss) {
    extraLeft = makeLimb(root, config, "left", "arm", 1.36, 1.08, .3);
    extraRight = makeLimb(root, config, "right", "arm", 1.36, 1.08, .3);
    extraLeft.position.x = -.9;
    extraRight.position.x = .9;
    addWeapon(leftArm, "bossBlade", "left");
    addWeapon(rightArm, "bossBlade", "right");
    addWeapon(extraLeft, "bossBlade", "left");
    addWeapon(extraRight, "bossBlade", "right");
  }

  return { root, parts: { body, head, leftArm, rightArm, leftLeg, rightLeg, extraLeft, extraRight }, config };
}

function createScene(canvas, config) {
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, 1, .1, 40);
  camera.position.set(0, 2.45, config.boss ? 7.2 : 6.4);
  camera.lookAt(0, 1.3, 0);

  scene.add(new THREE.HemisphereLight(0xffffff, 0x6d5430, 1.9));
  const key = new THREE.DirectionalLight(0xffffff, 2.4);
  key.position.set(4, 6, 4);
  key.castShadow = true;
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xf5dfb4, .8);
  fill.position.set(-3, 3, 2);
  scene.add(fill);

  const ground = block(scene, [5.1, .22, 4.2], 0x80643c, [0, -.13, 0], { roughness: .9 });
  ground.receiveShadow = true;
  ground.castShadow = false;

  const model = buildBlockCharacter(config);
  model.root.position.y = .04;
  model.root.rotation.y = config.boss ? -.24 : .18;
  scene.add(model.root);

  return { renderer, scene, camera, model, rotation: config.boss ? -.24 : .18, targetRotation: config.boss ? -.24 : .18, dragging: false, lastX: 0 };
}

function resizeRenderer(entry, viewer) {
  const rect = viewer.getBoundingClientRect();
  const width = Math.max(1, Math.floor(rect.width));
  const height = Math.max(1, Math.floor(rect.height));
  const canvas = entry.renderer.domElement;
  if (canvas.width !== width || canvas.height !== height) {
    entry.renderer.setSize(width, height, false);
    entry.camera.aspect = width / height;
    entry.camera.updateProjectionMatrix();
  }
}

function animateModel(model, elapsed) {
  const { config, parts, root } = model;
  const speed = config.boss ? 2.6 : config.zombie ? 3.1 : config.id === "davide" ? 4.8 : 4.1;
  const swing = Math.sin(elapsed * speed);
  const counter = Math.cos(elapsed * speed);
  const weight = config.boss ? .5 : config.zombie ? .55 : 1;

  root.position.y = .04 + Math.abs(swing) * .06 * weight;
  parts.body.rotation.z = swing * .025 * weight;
  parts.head.rotation.z = -swing * .035 * weight;
  if (config.zombie) {
    parts.leftArm.rotation.x = -.78 + swing * .1;
    parts.rightArm.rotation.x = -.78 - swing * .1;
  } else {
    parts.leftArm.rotation.x = swing * .66 * weight;
    parts.rightArm.rotation.x = -swing * .66 * weight;
  }
  parts.leftLeg.rotation.x = -swing * .58 * weight;
  parts.rightLeg.rotation.x = swing * .58 * weight;
  if (parts.extraLeft) parts.extraLeft.rotation.x = counter * .46;
  if (parts.extraRight) parts.extraRight.rotation.x = -counter * .46;
}

function attachDrag(viewer, entry) {
  viewer.addEventListener("pointerdown", event => {
    viewer.classList.add("dragging");
    entry.dragging = true;
    entry.lastX = event.clientX;
    viewer.setPointerCapture?.(event.pointerId);
  });
  viewer.addEventListener("pointermove", event => {
    if (!entry.dragging) return;
    const delta = event.clientX - entry.lastX;
    entry.lastX = event.clientX;
    entry.targetRotation += delta * .012;
  });
  const end = () => {
    viewer.classList.remove("dragging");
    entry.dragging = false;
  };
  viewer.addEventListener("pointerup", end);
  viewer.addEventListener("pointercancel", end);
}

characters.forEach(config => {
  const card = document.querySelector('.card[data-id="' + config.id + '"]');
  if (!card) return;
  const viewer = card.querySelector(".viewer");
  const canvas = card.querySelector("canvas");
  try {
    const entry = createScene(canvas, config);
    viewer.classList.add("webgl-ready");
    attachDrag(viewer, entry);
    liveCards.push({ viewer, entry });
  } catch (error) {
    console.error(error);
  }
});

const clock = new THREE.Clock();

function render() {
  const elapsed = clock.getElapsedTime();
  for (const { viewer, entry } of liveCards) {
    resizeRenderer(entry, viewer);
    entry.rotation += (entry.targetRotation - entry.rotation) * .18;
    if (!entry.dragging) entry.targetRotation += .0023;
    entry.model.root.rotation.y = entry.rotation;
    animateModel(entry.model, elapsed);
    entry.renderer.render(entry.scene, entry.camera);
  }
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
