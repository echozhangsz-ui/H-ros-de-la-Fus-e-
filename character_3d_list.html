<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Character List | Rocket Boss Game</title>
<style>
:root {
  --ink: #171717;
  --panel: rgba(255, 252, 244, .9);
  --line: #202020;
  --muted: #5d5a52;
  --accent: #2f8f72;
  --danger: #d14d35;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  color: var(--ink);
  font-family: Arial, "Microsoft YaHei", sans-serif;
  background: #d9caaa;
}

#scene {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
}

.ui {
  position: fixed;
  inset: 0;
  pointer-events: none;
  display: grid;
  grid-template-columns: minmax(180px, 260px) 1fr minmax(220px, 320px);
  gap: 14px;
  padding: 16px;
}

.panel {
  pointer-events: auto;
  align-self: start;
  background: var(--panel);
  border: 2px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 14px 38px rgba(23, 23, 23, .18);
  backdrop-filter: blur(12px);
}

.left-panel {
  padding: 10px;
}

.right-panel {
  padding: 16px;
  justify-self: end;
}

h1 {
  margin: 0 0 10px;
  font-size: 20px;
  line-height: 1.1;
}

h2 {
  margin: 0 0 8px;
  font-size: 26px;
}

.sub {
  margin: 0 0 14px;
  color: var(--muted);
  font-size: 13px;
}

.character-tabs {
  display: grid;
  gap: 8px;
}

button {
  border: 2px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 6px;
  min-height: 38px;
  padding: 8px 10px;
  font-weight: 800;
  cursor: pointer;
  text-align: left;
}

button.active {
  background: #17251f;
  color: #fff;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 14px 0;
}

.stat {
  border: 2px solid var(--line);
  background: #fff;
  border-radius: 6px;
  padding: 8px;
  font-size: 12px;
}

.stat strong {
  display: block;
  font-size: 20px;
}

.controls {
  pointer-events: auto;
  align-self: end;
  justify-self: center;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--panel);
  border: 2px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  box-shadow: 0 14px 38px rgba(23, 23, 23, .18);
}

.controls label {
  font-size: 13px;
  font-weight: 800;
}

input[type="range"] {
  width: 180px;
  accent-color: var(--accent);
}

.legend {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.pill {
  border: 2px solid var(--line);
  border-radius: 999px;
  background: #fff;
  padding: 5px 8px;
  font-size: 12px;
  font-weight: 800;
}

@media (max-width: 900px) {
  .ui {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
    padding: 10px;
  }

  .left-panel {
    display: none;
  }

  .right-panel {
    justify-self: stretch;
    max-width: none;
  }

  .controls {
    justify-self: stretch;
  }

  input[type="range"] {
    width: 100%;
  }
}
</style>
</head>
<body>
<canvas id="scene" aria-label="3D character scene"></canvas>

<div class="ui">
  <aside class="panel left-panel">
    <h1>3D Character List</h1>
    <p class="sub">Rocket Boss Game</p>
    <div class="character-tabs" id="characterTabs"></div>
  </aside>

  <div class="controls">
    <label for="speed">Walk Speed</label>
    <input id="speed" type="range" min="0.4" max="1.8" step="0.1" value="1">
  </div>

  <aside class="panel right-panel">
    <h2 id="name">Marc</h2>
    <p class="sub" id="role">Player · Explorer · Rocket builder</p>
    <p id="desc">主角，负责探索普通世界、收集资源、制造火箭并进入 Boss 地图。</p>
    <div class="stats">
      <div class="stat"><strong id="pv">12</strong>PV</div>
      <div class="stat"><strong id="atk">3+</strong>Attack</div>
      <div class="stat"><strong id="speedStat">Medium</strong>Speed</div>
    </div>
    <div class="legend" id="tags"></div>
  </aside>
</div>

<script type="module">
import * as THREE from "./three.module.js";

const characters = [
  {
    id: "marc",
    name: "Marc",
    role: "Player · Explorer · Rocket builder",
    desc: "主角，负责探索普通世界、收集资源、制造火箭并进入 Boss 地图。",
    pv: "12",
    atk: "3+",
    speed: "Medium",
    tags: ["Player", "Tool", "Rocket"],
    x: -6.2,
    scale: 1,
    skin: 0xefc49b,
    shirt: 0x2f8f72,
    pants: 0x385b93,
    hair: 0xf1c64f,
    weapon: "pickaxe"
  },
  {
    id: "davide",
    name: "Davide",
    role: "Enemy · Fast · Sword",
    desc: "强力敌人，移动快，适合做追击型近战单位。",
    pv: "8",
    atk: "6+",
    speed: "Fast",
    tags: ["Enemy", "Sword", "Chase"],
    x: -3.7,
    scale: 1.02,
    skin: 0xd89b71,
    shirt: 0x1e4d7a,
    pants: 0x2b2b31,
    hair: 0xc8d7e8,
    weapon: "sword"
  },
  {
    id: "julie",
    name: "Julie Robot",
    role: "Robot · Guard · Smooth",
    desc: "机器人角色，守护重要资源，动作稳定但机械感更强。",
    pv: "15",
    atk: "4+",
    speed: "Steady",
    tags: ["Robot", "Guard", "Resource"],
    x: -1.2,
    scale: 1,
    skin: 0x8792a2,
    shirt: 0xa7b0bd,
    pants: 0x59606c,
    hair: 0x72d8ff,
    robot: true
  },
  {
    id: "olivier",
    name: "Olivier",
    role: "Enemy · Ambush · High damage",
    desc: "高伤害敌人，适合躲在地图角落或资源点附近突然出现。",
    pv: "7",
    atk: "7+",
    speed: "Quick",
    tags: ["Enemy", "Ambush", "Damage"],
    x: 1.2,
    scale: 1.04,
    skin: 0xc78962,
    shirt: 0x7b2c28,
    pants: 0x3c2a23,
    hair: 0xf0a23a,
    weapon: "club"
  },
  {
    id: "zombie",
    name: "Zombie",
    role: "Enemy · Common · Map patrol",
    desc: "普通世界常见敌人，负责基础战斗压力。",
    pv: "7",
    atk: "5",
    speed: "Slow",
    tags: ["Enemy", "Patrol", "Slow"],
    x: 3.7,
    scale: .98,
    skin: 0x8db579,
    shirt: 0x556b46,
    pants: 0x3f4b39,
    hair: 0xb44a4a,
    zombie: true
  },
  {
    id: "boss",
    name: "Boss",
    role: "Final Boss · Volcano · Multi-arm",
    desc: "最终 Boss，驻守火山区域，攻击很高，是游戏结尾的主要目标。",
    pv: "70",
    atk: "40",
    speed: "Heavy",
    tags: ["Boss", "Volcano", "Lava"],
    x: 6.3,
    scale: 1.34,
    skin: 0x6d211c,
    shirt: 0xe44d26,
    pants: 0x322225,
    hair: 0xffd166,
    boss: true
  }
];

const canvas = document.getElementById("scene");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd9caaa);
scene.fog = new THREE.Fog(0xd9caaa, 14, 34);

const camera = new THREE.PerspectiveCamera(42, 1, .1, 80);
camera.position.set(0, 4.8, 14.5);
camera.lookAt(0, 1.2, 0);

const hemi = new THREE.HemisphereLight(0xffffff, 0x8d6c42, 2.1);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffffff, 2.2);
sun.position.set(5, 9, 7);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 30;
sun.shadow.camera.left = -12;
sun.shadow.camera.right = 12;
sun.shadow.camera.top = 10;
sun.shadow.camera.bottom = -10;
scene.add(sun);

const groundMat = new THREE.MeshStandardMaterial({ color: 0x8c744b, roughness: .88, metalness: .05 });
const ground = new THREE.Mesh(new THREE.BoxGeometry(21, .34, 8), groundMat);
ground.position.y = -.2;
ground.receiveShadow = true;
scene.add(ground);

const stripeMat = new THREE.MeshStandardMaterial({ color: 0x55462e, roughness: .9 });
const stripes = [];
for (let i = 0; i < 18; i++) {
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(.12, .03, 7.8), stripeMat);
  stripe.position.set(-10.5 + i * 1.25, .01, 0);
  stripe.receiveShadow = true;
  stripes.push(stripe);
  scene.add(stripe);
}

const backMat = new THREE.MeshStandardMaterial({ color: 0xcbb78e, roughness: .9 });
const backWall = new THREE.Mesh(new THREE.BoxGeometry(26, 7, .24), backMat);
backWall.position.set(0, 3.05, -4.15);
backWall.receiveShadow = true;
scene.add(backWall);

function mat(color, roughness = .72, metalness = .02) {
  return new THREE.MeshStandardMaterial({ color, roughness, metalness });
}

function addPart(parent, geometry, material, position, scale = [1, 1, 1], cast = true) {
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(position[0], position[1], position[2]);
  mesh.scale.set(scale[0], scale[1], scale[2]);
  mesh.castShadow = cast;
  mesh.receiveShadow = true;
  parent.add(mesh);
  return mesh;
}

function limb(parent, color, side, kind) {
  const pivot = new THREE.Group();
  const x = side === "left" ? -.43 : .43;
  const y = kind === "arm" ? 1.72 : .74;
  pivot.position.set(x, y, 0);
  parent.add(pivot);

  const length = kind === "arm" ? .86 : .98;
  const radius = kind === "arm" ? .105 : .14;
  const part = addPart(pivot, new THREE.CapsuleGeometry(radius, length, 8, 14), mat(color), [0, -length * .46, 0], [1, 1, 1]);
  part.rotation.z = kind === "arm" ? (side === "left" ? .15 : -.15) : 0;
  return pivot;
}

function makeWeapon(parent, type) {
  if (!type) return null;
  const group = new THREE.Group();
  group.position.set(.05, -.55, 0);
  parent.add(group);
  if (type === "sword") {
    addPart(group, new THREE.BoxGeometry(.07, 1.22, .07), mat(0xdfe7ef, .35, .5), [0, -.08, 0]);
    addPart(group, new THREE.BoxGeometry(.34, .08, .08), mat(0x2b2b31), [0, .52, 0]);
  } else if (type === "pickaxe") {
    addPart(group, new THREE.BoxGeometry(.07, 1.04, .07), mat(0x7a5434), [0, -.12, 0]);
    addPart(group, new THREE.BoxGeometry(.62, .08, .08), mat(0xb8c0c8, .42, .35), [0, .38, 0]);
  } else if (type === "club") {
    addPart(group, new THREE.CapsuleGeometry(.12, .92, 8, 12), mat(0x5a3928), [0, -.1, 0]);
    addPart(group, new THREE.SphereGeometry(.2, 16, 12), mat(0x7d4b30), [0, .38, 0]);
  }
  return group;
}

function buildCharacter(config) {
  const root = new THREE.Group();
  root.position.x = config.x;
  root.scale.setScalar(config.scale);
  root.userData.config = config;

  const bodyShape = config.robot
    ? new THREE.BoxGeometry(.96, 1.24, .56)
    : new THREE.CapsuleGeometry(.46, .96, 12, 20);
  const body = addPart(root, bodyShape, mat(config.shirt, .68, config.robot ? .26 : .02), [0, 1.4, 0]);
  if (!config.robot) body.scale.x = config.boss ? 1.25 : 1;

  const headGeom = config.robot
    ? new THREE.BoxGeometry(.72, .54, .58)
    : new THREE.SphereGeometry(.38, 24, 18);
  const head = addPart(root, headGeom, mat(config.skin, .62, config.robot ? .34 : .02), [0, 2.25, 0]);

  const hair = config.robot
    ? addPart(root, new THREE.SphereGeometry(.08, 12, 10), mat(config.hair, .35, .45), [0, 2.62, 0])
    : addPart(root, new THREE.SphereGeometry(.4, 24, 12, 0, Math.PI * 2, 0, Math.PI * .45), mat(config.hair), [0, 2.36, 0]);
  hair.scale.y = config.robot ? 1 : .42;

  const eyeMat = mat(config.boss ? 0xffd166 : config.robot ? 0x72d8ff : 0x111111, .4, config.robot ? .5 : .02);
  addPart(root, new THREE.SphereGeometry(.045, 10, 8), eyeMat, [-.13, 2.27, .36]);
  addPart(root, new THREE.SphereGeometry(.045, 10, 8), eyeMat, [.13, 2.27, .36]);

  if (config.boss) {
    addPart(root, new THREE.ConeGeometry(.14, .35, 4), mat(config.hair), [-.18, 2.72, 0]);
    addPart(root, new THREE.ConeGeometry(.14, .35, 4), mat(config.hair), [.18, 2.72, 0]);
  }

  const leftArm = limb(root, config.skin, "left", "arm");
  const rightArm = limb(root, config.skin, "right", "arm");
  const leftLeg = limb(root, config.pants, "left", "leg");
  const rightLeg = limb(root, config.pants, "right", "leg");

  let extraLeft = null;
  let extraRight = null;
  if (config.boss) {
    extraLeft = limb(root, config.skin, "left", "arm");
    extraRight = limb(root, config.skin, "right", "arm");
    extraLeft.position.y = 1.43;
    extraRight.position.y = 1.43;
    extraLeft.position.x = -.58;
    extraRight.position.x = .58;
  }

  const weapon = makeWeapon(rightArm, config.weapon);
  if (weapon) weapon.rotation.z = config.weapon === "sword" ? -.45 : .35;

  const namePlate = addPart(root, new THREE.BoxGeometry(1.35, .08, .12), mat(config.hair), [0, .08, .02], [1, 1, 1], false);
  namePlate.userData.nonAnimated = true;

  root.userData.parts = { body, head, leftArm, rightArm, leftLeg, rightLeg, extraLeft, extraRight };
  scene.add(root);
  return root;
}

const models = characters.map(buildCharacter);
let activeIndex = 0;
let speedMultiplier = 1;

const tabs = document.getElementById("characterTabs");
const nameEl = document.getElementById("name");
const roleEl = document.getElementById("role");
const descEl = document.getElementById("desc");
const pvEl = document.getElementById("pv");
const atkEl = document.getElementById("atk");
const speedEl = document.getElementById("speedStat");
const tagsEl = document.getElementById("tags");

function setActive(index) {
  activeIndex = index;
  const item = characters[index];
  nameEl.textContent = item.name;
  roleEl.textContent = item.role;
  descEl.textContent = item.desc;
  pvEl.textContent = item.pv;
  atkEl.textContent = item.atk;
  speedEl.textContent = item.speed;
  tagsEl.innerHTML = item.tags.map(tag => `<span class="pill">${tag}</span>`).join("");
  tabs.querySelectorAll("button").forEach((button, i) => button.classList.toggle("active", i === index));
}

characters.forEach((item, index) => {
  const button = document.createElement("button");
  button.type = "button";
  button.textContent = item.name;
  button.addEventListener("click", () => setActive(index));
  tabs.appendChild(button);
});
setActive(0);

document.getElementById("speed").addEventListener("input", event => {
  speedMultiplier = Number(event.target.value);
});

const clock = new THREE.Clock();
const target = new THREE.Vector3();
const cameraTarget = new THREE.Vector3(0, 1.25, 0);

function animateModel(model, elapsed) {
  const config = model.userData.config;
  const parts = model.userData.parts;
  const phase = elapsed * (config.boss ? 3.2 : config.zombie ? 3.6 : 4.4) * speedMultiplier + config.x * .27;
  const swing = Math.sin(phase);
  const counter = Math.cos(phase);
  const weight = config.boss ? .52 : config.zombie ? .75 : 1;

  model.position.y = Math.abs(swing) * .09 * weight;
  parts.body.rotation.z = swing * .035 * weight;
  parts.head.rotation.z = -swing * .05 * weight;
  parts.leftArm.rotation.x = swing * .7 * weight;
  parts.rightArm.rotation.x = -swing * .7 * weight;
  parts.leftLeg.rotation.x = -swing * .62 * weight;
  parts.rightLeg.rotation.x = swing * .62 * weight;
  if (parts.extraLeft) parts.extraLeft.rotation.x = counter * .48;
  if (parts.extraRight) parts.extraRight.rotation.x = -counter * .48;

  if (config.zombie) {
    parts.leftArm.rotation.x = -.95 + swing * .2;
    parts.rightArm.rotation.x = -.95 - swing * .2;
    parts.head.rotation.z = .12 * Math.sin(phase * .5);
  }
}

function resize() {
  const width = window.innerWidth;
  const height = window.innerHeight;
  renderer.setSize(width, height, false);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize();

function render() {
  const elapsed = clock.getElapsedTime();
  models.forEach(model => animateModel(model, elapsed));

  stripes.forEach((stripe, index) => {
  stripe.position.x = -10.5 + ((index * 1.25 + elapsed * .9 * speedMultiplier) % 21);
  });

  const active = models[activeIndex];
  target.set(active.position.x * .14, 1.4, 0);
  cameraTarget.lerp(target, .035);
  camera.position.x += (active.position.x * .06 - camera.position.x) * .035;
  camera.lookAt(cameraTarget);

  renderer.render(scene, camera);
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
